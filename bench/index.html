<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cortex · Bench Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ---------- Cortex design tokens ---------- */
    :root {
      --bg: oklch(0.1448 0 0);
      --card: oklch(0.2134 0 0);
      --card-hover: oklch(0.2686 0 0);
      --fg: oklch(0.9851 0 0);
      --fg-muted: oklch(0.7090 0 0);
      --fg-subtle: oklch(0.5500 0 0);
      --border: oklch(0.3407 0 0);
      --border-strong: oklch(0.4386 0 0);
      --accent: oklch(0.79 0.18 70.67);
      --accent-fg: oklch(0.1448 0 0);
      --accent-soft: oklch(0.79 0.18 70.67 / 0.12);
      --destructive: oklch(0.7022 0.1892 22.2279);
      --destructive-soft: oklch(0.7022 0.1892 22.2279 / 0.15);
      --warn: oklch(0.78 0.12 70);
      --warn-soft: oklch(0.78 0.12 70 / 0.12);
      --radius: 0.5rem;
      --radius-sm: 0.375rem;
      --radius-lg: 0.75rem;
      --font-sans: Inter, system-ui, -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.3);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
    }

    /* ---------- reset + global ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; transition: opacity 120ms ease; }
    a:hover { opacity: 0.8; }
    code, pre, .mono { font-family: var(--font-mono); font-size: 0.92em; }

    /* ---------- layout ---------- */
    .page {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px 96px;
    }

    /* ---------- header ---------- */
    header.bench-header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .brand svg {
      height: 28px;
      width: auto;
      color: var(--fg);
    }
    .brand-text { display: flex; flex-direction: column; line-height: 1.2; }
    .brand-text h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .brand-text .tag {
      font-size: 12px;
      color: var(--fg-muted);
      font-weight: 400;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }
    .header-meta {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      font-size: 12px;
      color: var(--fg-muted);
    }
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: background 120ms ease, border 120ms ease;
    }
    .refresh-btn:hover { background: var(--card-hover); border-color: var(--border-strong); }

    /* ---------- section primitives ---------- */
    section.bench-section {
      margin-bottom: 32px;
    }
    h2.section-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
      margin: 0 0 12px;
    }

    /* ---------- glass card ---------- */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
    }

    /* ---------- live "running now" card ---------- */
    .live-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: var(--radius-lg);
      padding: 20px 24px;
      box-shadow: var(--shadow-md);
      margin-bottom: 24px;
    }
    .live-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .live-title {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .live-pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 0 var(--accent);
      animation: live-pulse 1.6s infinite;
    }
    @keyframes live-pulse {
      0%   { opacity: 1;   box-shadow: 0 0 0 0 oklch(0.79 0.18 70.67 / 0.55); }
      70%  { opacity: 0.55; box-shadow: 0 0 0 8px oklch(0.79 0.18 70.67 / 0); }
      100% { opacity: 1;   box-shadow: 0 0 0 0 oklch(0.79 0.18 70.67 / 0); }
    }
    .live-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      padding: 2px 8px;
      background: var(--accent-soft);
      border-radius: 999px;
    }
    .live-title-text {
      font-family: var(--font-mono);
      color: var(--fg);
    }
    .live-meta {
      font-size: 11px;
      color: var(--fg-muted);
      font-family: var(--font-mono);
      text-align: right;
    }
    .live-phase-row {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    .phase-chip {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-family: var(--font-mono);
      letter-spacing: 0.02em;
      background: oklch(0 0 0 / 0.25);
      color: var(--fg-muted);
      border: 1px solid var(--border);
    }
    .phase-chip.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }
    .phase-chip.done {
      color: var(--fg);
      background: oklch(0 0 0 / 0.35);
    }
    .phase-arrow {
      color: var(--fg-subtle);
      font-size: 11px;
    }
    .live-stats-row {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
    }
    .live-stats-row .stat .value { font-family: var(--font-mono); }
    .live-events-card {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    .live-events-card h4 {
      margin: 0 0 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
    }
    .live-events-list {
      max-height: 240px;
      overflow-y: auto;
      list-style: none;
      margin: 0;
      padding: 0;
      font-size: 12px;
      font-family: var(--font-mono);
    }
    .live-events-list li {
      display: flex;
      gap: 12px;
      padding: 4px 0;
      border-bottom: 1px solid oklch(0 0 0 / 0.15);
    }
    .live-events-list li:last-child { border-bottom: 0; }
    .live-events-list .ev-ts { color: var(--fg-muted); flex-shrink: 0; font-size: 11px; }
    .live-events-list .ev-text { color: var(--fg); flex: 1; }
    .live-events-list .ev-warning .ev-text { color: var(--warn); }
    .live-events-list .ev-error .ev-text { color: var(--destructive); font-weight: 500; }
    .live-events-list .ev-candidate_scan_zero .ev-text { color: var(--warn); }
    .live-empty-events {
      color: var(--fg-muted);
      font-size: 12px;
      font-style: italic;
      padding: 8px 0;
    }

    /* ---------- empty state ---------- */
    .empty-state {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 64px 32px;
      text-align: center;
      box-shadow: var(--shadow-md);
      max-width: 640px;
      margin: 80px auto;
    }
    .empty-state h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .empty-state p { color: var(--fg-muted); margin: 0 0 16px; }
    .empty-state .preview-list {
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      text-align: left;
    }
    .empty-state .preview-list h3 {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
      margin: 0 0 12px;
    }
    .empty-state .preview-list ul {
      margin: 0;
      padding-left: 20px;
      color: var(--fg-muted);
    }
    .empty-state .preview-list li { margin-bottom: 6px; font-size: 13px; }

    /* ---------- hero ---------- */
    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px 28px;
      box-shadow: var(--shadow-md);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: center;
    }
    .hero-main h2 {
      margin: 0 0 4px;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .hero-sub {
      color: var(--fg-muted);
      font-size: 13px;
      margin: 0;
    }
    .hero-stats {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .stat {
      background: oklch(0 0 0 / 0.25);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      min-width: 96px;
    }
    .stat .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--fg-muted);
    }
    .stat .value {
      font-size: 18px;
      font-weight: 600;
      margin-top: 2px;
    }
    .verdict-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      font-family: var(--font-mono);
    }
    .chip .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .chip.GOOD { background: var(--accent-soft); color: var(--accent); }
    .chip.MIXED { background: oklch(0 0 0 / 0.3); color: var(--fg); border: 1px solid var(--border-strong); }
    .chip.POOR { background: oklch(0 0 0 / 0.4); color: var(--fg-muted); border: 1px solid var(--border); }
    .chip.ERROR, .chip.TIMED_OUT { background: var(--destructive-soft); color: var(--destructive); }
    .chip.UNKNOWN { background: oklch(0 0 0 / 0.2); color: var(--fg-muted); }

    /* ---------- chart grid ---------- */
    .chart-row {
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 16px;
    }
    @media (max-width: 880px) { .chart-row { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .chart-card h3 {
      margin: 0 0 4px;
      font-size: 14px;
      font-weight: 600;
    }
    .chart-card .chart-sub {
      font-size: 12px;
      color: var(--fg-muted);
      margin: 0 0 16px;
    }
    .chart-canvas-wrap {
      position: relative;
      height: 260px;
    }
    .chart-canvas-wrap.tall { height: 320px; }

    /* ---------- failure heatmap ---------- */
    .heatmap-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      overflow-x: auto;
    }
    .heatmap {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .heatmap th, .heatmap td {
      padding: 8px 10px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .heatmap th {
      font-weight: 600;
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 10px;
      background: oklch(0 0 0 / 0.2);
    }
    .heatmap td.combo-cell { text-align: left; font-family: var(--font-mono); font-size: 11px; color: var(--fg); }
    .heatmap td.signal-cell {
      font-family: var(--font-mono);
      font-weight: 500;
    }
    .heatmap td.signal-cell.zero { color: var(--fg-subtle); }
    .heatmap td.signal-cell.low { background: var(--warn-soft); color: var(--warn); }
    .heatmap td.signal-cell.high { background: var(--destructive-soft); color: var(--destructive); font-weight: 600; }

    /* ---------- per-combo detail cards ---------- */
    .combo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(440px, 1fr));
      gap: 16px;
    }
    @media (max-width: 540px) { .combo-grid { grid-template-columns: 1fr; } }
    .combo-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border 120ms ease;
    }
    .combo-card:hover { border-color: var(--border-strong); }
    .combo-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
    }
    .combo-id {
      margin: 0;
      font-size: 15px;
      font-weight: 600;
      font-family: var(--font-mono);
      letter-spacing: -0.01em;
    }
    .combo-batch {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--fg-subtle);
      margin: 2px 0 0;
    }
    .model-trio {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 12px;
      font-size: 11px;
      padding: 12px;
      background: oklch(0 0 0 / 0.2);
      border-radius: var(--radius-sm);
    }
    .model-trio .tier {
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 10px;
    }
    .model-trio .model {
      font-family: var(--font-mono);
      color: var(--fg);
      word-break: break-all;
    }
    .combo-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      font-size: 11px;
    }
    .combo-stats .mini-stat {
      padding: 8px;
      background: oklch(0 0 0 / 0.2);
      border-radius: var(--radius-sm);
      text-align: center;
    }
    .combo-stats .mini-stat .label {
      color: var(--fg-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: 9px;
    }
    .combo-stats .mini-stat .value {
      font-weight: 600;
      font-size: 14px;
      margin-top: 2px;
      font-family: var(--font-mono);
    }
    details.analysis {
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }
    details.analysis summary {
      cursor: pointer;
      color: var(--fg-muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      list-style: none;
      user-select: none;
    }
    details.analysis summary::-webkit-details-marker { display: none; }
    details.analysis summary::before {
      content: "▸";
      display: inline-block;
      margin-right: 6px;
      transition: transform 150ms ease;
    }
    details.analysis[open] summary::before { transform: rotate(90deg); }
    .analysis-block {
      margin-top: 12px;
      font-size: 12px;
      color: var(--fg);
    }
    .analysis-block h4 {
      margin: 12px 0 4px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--fg-muted);
      font-weight: 600;
    }
    .analysis-block h4:first-child { margin-top: 0; }
    .analysis-block p { margin: 0; color: var(--fg); }
    .analysis-block pre {
      margin: 4px 0 0;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: var(--fg);
      font-family: var(--font-sans);
      font-size: 12px;
    }

    /* ---------- findings markdown ---------- */
    .findings-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 28px 32px;
      box-shadow: var(--shadow-md);
    }
    .findings-card .findings-md h1 { font-size: 22px; margin: 24px 0 12px; font-weight: 600; }
    .findings-card .findings-md h2 { font-size: 18px; margin: 22px 0 10px; font-weight: 600; }
    .findings-card .findings-md h3 { font-size: 15px; margin: 18px 0 8px; font-weight: 600; color: var(--fg-muted); }
    .findings-card .findings-md h1:first-child,
    .findings-card .findings-md h2:first-child,
    .findings-card .findings-md h3:first-child { margin-top: 0; }
    .findings-card .findings-md p { margin: 0 0 12px; color: var(--fg); }
    .findings-card .findings-md ul, .findings-card .findings-md ol { margin: 0 0 12px; padding-left: 24px; color: var(--fg); }
    .findings-card .findings-md li { margin-bottom: 6px; }
    .findings-card .findings-md code {
      background: oklch(0 0 0 / 0.3);
      padding: 1px 6px;
      border-radius: var(--radius-sm);
      font-size: 0.9em;
    }
    .findings-card .findings-md pre {
      background: oklch(0 0 0 / 0.3);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: var(--radius);
      overflow-x: auto;
    }
    .findings-card .findings-md pre code { background: none; padding: 0; }
    .findings-card .findings-md blockquote {
      border-left: 3px solid var(--accent);
      margin: 12px 0;
      padding: 4px 16px;
      color: var(--fg-muted);
      background: oklch(0 0 0 / 0.2);
    }
    .findings-card .findings-md hr { border: 0; border-top: 1px solid var(--border); margin: 24px 0; }
    .findings-card .findings-md a { color: var(--accent); }
    .findings-card .findings-md strong { color: var(--fg); font-weight: 600; }
    .findings-card .findings-md table {
      border-collapse: collapse;
      width: 100%;
      margin: 12px 0;
      font-size: 13px;
    }
    .findings-card .findings-md th,
    .findings-card .findings-md td {
      border: 1px solid var(--border);
      padding: 6px 10px;
      text-align: left;
    }
    .findings-card .findings-md th {
      background: oklch(0 0 0 / 0.2);
      font-weight: 600;
    }

    /* ---------- footer ---------- */
    footer.bench-footer {
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      color: var(--fg-muted);
      font-size: 11px;
      text-align: center;
    }
    footer code { color: var(--accent); }

    /* ---------- small helpers ---------- */
    .row-flex { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .placeholder {
      padding: 40px;
      text-align: center;
      color: var(--fg-muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="bench-header">
      <div class="brand">
        <!-- Cortex logo (inlined from frontend/public/logo.svg, white→currentColor) -->
        <svg viewBox="0 0 132 37" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
          <g clip-path="url(#dash_logo_clip)" fill="currentColor">

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>

  <script>
    // ---------- Cortex tokens as JS constants (for Chart.js canvas) ----------
    const C = {
      bg:          'oklch(0.1448 0 0)',
      card:        'oklch(0.2134 0 0)',
      fg:          'oklch(0.9851 0 0)',
      fgMuted:     'oklch(0.7090 0 0)',
      fgSubtle:    'oklch(0.5500 0 0)',
      border:      'oklch(0.3407 0 0)',
      accent:      'oklch(0.79 0.18 70.67)',
      accentSoft:  'oklch(0.79 0.18 70.67 / 0.35)',
      destructive: 'oklch(0.7022 0.1892 22.2279)',
      destSoft:    'oklch(0.7022 0.1892 22.2279 / 0.35)',
      neutral:     'oklch(0.5500 0 0)',
      neutralSoft: 'oklch(0.45 0 0)',
      warn:        'oklch(0.78 0.12 70)',
      shadeA:      'oklch(0.79 0.18 70.67 / 0.85)',  // Phase A — accent-ish
      shadeB:      'oklch(0.5500 0 0)',               // Phase B — neutral
      shadeC:      'oklch(0.3407 0 0)',               // Step 3 — dim
    };
    const VERDICT_COLOR = {
      GOOD: C.accent,
      MIXED: C.neutral,
      POOR: C.neutralSoft,
      ERROR: C.destructive,
      TIMED_OUT: C.destSoft,
      UNKNOWN: C.border,
    };
    const VERDICT_ORDER = ['GOOD', 'MIXED', 'POOR', 'TIMED_OUT', 'ERROR', 'UNKNOWN'];

    // ---------- chart defaults ----------
    if (window.Chart) {
      Chart.defaults.color = C.fgMuted;
      Chart.defaults.borderColor = C.border;
      Chart.defaults.font.family = 'Inter, system-ui, sans-serif';
      Chart.defaults.font.size = 11;
      Chart.defaults.plugins.legend.position = 'bottom';
      Chart.defaults.plugins.legend.labels.usePointStyle = true;
      Chart.defaults.plugins.legend.labels.boxWidth = 8;
      Chart.defaults.plugins.legend.labels.padding = 12;
    }

    // ---------- helpers ----------
    function el(tag, props = {}, children = []) {
      const node = document.createElement(tag);
      for (const k in props) {
        if (k === 'class') node.className = props[k];
        else if (k === 'html') node.innerHTML = props[k];
        else if (k === 'text') node.textContent = props[k];
        else if (k.startsWith('on') && typeof props[k] === 'function') node.addEventListener(k.slice(2).toLowerCase(), props[k]);
        else node.setAttribute(k, props[k]);
      }
      const kids = Array.isArray(children) ? children : [children];
      for (const c of kids) {
        if (c == null) continue;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return node;
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' }); }
      catch { return iso; }
    }
    function fmtSec(s) {
      if (s == null) return '—';
      if (s < 60) return s + 's';
      const m = Math.floor(s / 60);
      const r = s - m * 60;
      return `${m}m ${r}s`;
    }
    function num(n, dp = 0) {
      if (n == null || isNaN(n)) return '—';
      return Number(n).toFixed(dp);
    }
    function esc(s) {
      if (s == null) return '';
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    // ---------- main render ----------
    document.addEventListener('DOMContentLoaded', () => {
      const root = document.getElementById('content');
      const meta = document.getElementById('meta-info');
      const footer = document.getElementById('footer-info');
      const data = window.BENCH_DATA;

      // Data file missing entirely
      if (window.BENCH_DATA_MISSING || !data) {
        meta.textContent = 'no data file yet';
        renderEmptyState(root, { missingDataFile: true });
        footer.innerHTML = 'Generated by <code>bench/build_dashboard.py</code> — run a bench batch or <code>python bench/build_dashboard.py</code> to populate.';
        return;
      }

      meta.textContent = data.has_data
        ? `${data.total_runs} runs · ${data.total_batches} batches · generated ${fmtDate(data.generated_at)}`
        : `no bench runs yet`;
      footer.innerHTML =
        `Generated by <code>bench/build_dashboard.py</code> at ${esc(fmtDate(data.generated_at))} · ` +
        `${data.total_runs} runs across ${data.total_batches} batches.`;

      // Live "running now" card — only when a batch is in flight
      renderLiveCard(root, data);

      if (!data.has_data) {
        renderEmptyState(root, {});
        return;
      }

      renderHero(root, data);
      renderChartsRow(root, data);
      renderHeatmap(root, data);
      renderComboCards(root, data);
      renderFindings(root, data);
    });

    // ---------- live "running now" card ----------
    const PHASES = [
      { id: 'A', label: 'Phase A · entity extraction' },
      { id: 'B', label: 'Phase B · relationship analysis' },
      { id: 'step_3', label: 'Step 3 · community detection' },
      { id: 'done', label: 'wrapping up' },
    ];
    function renderLiveCard(root, data) {
      const live = data.live;
      if (!live || !live.active) return;
      const startedAt = new Date(live.started_at);
      const phaseStartedAt = new Date(live.phase_started_at || live.started_at);
      const elapsedTotal = Math.max(0, Math.floor((Date.now() - startedAt.getTime()) / 1000));
      const elapsedPhase = Math.max(0, Math.floor((Date.now() - phaseStartedAt.getTime()) / 1000));
      const phaseLabel = (PHASES.find(p => p.id === live.phase) || PHASES[0]).label;
      const s = live.stats || {};

      const phaseChips = PHASES.slice(0, 3).flatMap((p, i, arr) => {
        const reached = PHASES.findIndex(x => x.id === live.phase) >= i;
        const isActive = p.id === live.phase;
        const cls = isActive ? 'phase-chip active' : (reached ? 'phase-chip done' : 'phase-chip');
        const chip = el('span', { class: cls, text: p.id === 'step_3' ? 'Step 3' : `Phase ${p.id}` });
        if (i < arr.length - 1) return [chip, el('span', { class: 'phase-arrow', text: '→' })];
        return [chip];
      });

      const events = live.recent_events || [];
      const eventsList = events.length === 0
        ? el('div', { class: 'live-empty-events', text: 'Waiting for first ingestion event…' })
        : el('ul', { class: 'live-events-list' }, events.map(ev => {
            const ts = (ev.ts || '').slice(11, 19); // HH:MM:SS
            const kindClass = `ev-${ev.kind || 'info'}`;
            return el('li', { class: kindClass }, [
              el('span', { class: 'ev-ts', text: ts }),
              el('span', { class: 'ev-text', text: ev.summary || ev.kind || '' }),
            ]);
          }));

      const card = el('section', { class: 'bench-section' }, [
        el('div', { class: 'live-card' }, [
          el('div', { class: 'live-head' }, [
            el('div', { class: 'live-title' }, [
              el('span', { class: 'live-pulse', 'aria-hidden': 'true' }),
              el('span', { class: 'live-label', text: 'LIVE' }),
              el('span', { class: 'live-title-text', text:
                `Combo ${live.combo_index || '?'} of ${live.combo_total || '?'} · ${live.combo_id || ''}` }),
            ]),
            el('div', { class: 'live-meta' }, [
              el('div', { text: `Batch ${live.batch_id || '?'}` }),
              el('div', { text: `Started ${fmtDate(live.started_at)} · ${fmtSec(elapsedTotal)} elapsed` }),
            ]),
          ]),
          el('div', { class: 'live-phase-row' }, [
            ...phaseChips,
            el('span', {
              class: 'phase-chip active',
              style: 'margin-left: 12px;',
              text: `${phaseLabel} · ${fmtSec(elapsedPhase)} in phase`,
            }),
          ]),
          el('div', { class: 'live-stats-row' }, [
            statBox('Documents', `${s.completed_count || 0} / ${s.document_count || 0}`),
            statBox('Entities', num(s.entity_count)),
            statBox('Relationships', num(s.relationship_count)),
            statBox('Communities', num(s.community_count)),
            statBox('Chunks', num(s.chunk_count)),
          ]),
          el('div', { class: 'live-events-card' }, [
            el('h4', { text: `Recent events (${events.length})` }),
            eventsList,
          ]),
        ]),
      ]);
      root.appendChild(card);
    }

    // ---------- empty state ----------
    function renderEmptyState(root, { missingDataFile } = {}) {
      const node = el('div', { class: 'empty-state' }, [
        el('h1', { text: 'No bench runs yet' }),
        el('p', {
          html: missingDataFile
            ? 'No <code>logs/dashboard-data.js</code> found. Either no bench batch has been run, ' +
              'or you need to run <code>python bench/build_dashboard.py</code> to regenerate the data file.'
            : 'Check the <a href="README.md" target="_blank">README</a> to understand how to use ' +
              'the bench harness, then come back to this page when your first runs are done.',
        }),
        el('div', { class: 'preview-list' }, [
          el('h3', { text: 'Once data lands, this page will show' }),
          el('ul', {}, [
            el('li', { text: 'Latest batch summary with verdict breakdown' }),
            el('li', { text: 'Verdict distribution across all runs (donut chart)' }),
            el('li', { text: 'Entity-to-relationship ratio (ERR) per combo' }),
            el('li', { text: 'Phase A / Phase B / Step 3 timing breakdown' }),
            el('li', { text: 'Failure-signal heatmap (empty content, format misses, timeouts, etc.)' }),
            el('li', { text: 'Per-combo detail cards with model trio + LLM observations' }),
            el('li', { text: 'Cross-run findings from the end-of-batch LLM review (runs against your configured primary model)' }),
          ]),
        ]),
      ]);
      root.appendChild(node);
    }

    // ---------- hero ----------
    function renderHero(root, data) {
      const latest = data.latest_batch || {};
      const verdicts = latest.verdicts || {};
      const runIds = latest.run_ids || [];
      const batchRuns = data.runs.filter(r => latest.run_ids && latest.run_ids.includes(r.run_id));
      const totalSec = batchRuns.reduce((s, r) => s + (r.duration_total_sec || 0), 0);
      const totalEntities = batchRuns.reduce((s, r) => s + (r.entities || 0), 0);
      const totalRels = batchRuns.reduce((s, r) => s + (r.relationships_total || 0), 0);

      const chips = VERDICT_ORDER.filter(v => verdicts[v]).map(v =>
        el('span', { class: `chip ${v}` }, [
          el('span', { class: 'dot' }),
          el('span', { text: `${v} · ${verdicts[v]}` }),
        ])
      );

      const hero = el('section', { class: 'bench-section' }, [
        el('h2', { class: 'section-title', text: 'Latest batch' }),
        el('div', { class: 'hero' }, [
          el('div', { class: 'hero-main' }, [
            el('h2', { class: 'mono', text: latest.batch_id || 'unknown' }),
            el('p', { class: 'hero-sub', text:
              `${runIds.length} combo${runIds.length === 1 ? '' : 's'} · `
              + `${fmtSec(totalSec)} total wall time · ${totalEntities} entities · ${totalRels} relationships`
            }),
            el('div', { class: 'verdict-chips' }, chips),
          ]),
          el('div', { class: 'hero-stats' }, [
            statBox('Runs', runIds.length),
            statBox('Wall time', fmtSec(totalSec)),
            statBox('Avg ERR', avgErr(batchRuns)),
          ]),
        ]),
      ]);
      root.appendChild(hero);
    }
    function statBox(label, value) {
      return el('div', { class: 'stat' }, [
        el('div', { class: 'label', text: label }),
        el('div', { class: 'value', text: String(value) }),
      ]);
    }
    function avgErr(runs) {
      if (!runs.length) return '—';
      const sum = runs.reduce((s, r) => s + (r.err || 0), 0);
      return (sum / runs.length).toFixed(2);
    }

    // ---------- charts row ----------
    function renderChartsRow(root, data) {
      const wrap = el('section', { class: 'bench-section' }, [
        el('h2', { class: 'section-title', text: 'Distribution & comparison' }),
        el('div', { class: 'chart-row' }, [
          chartCard('Verdicts across all runs', `${data.total_runs} total · ${data.total_batches} batches`, 'verdictChart'),
          chartCard('Entity–relationship ratio (ERR) per combo', 'Target = 1.0 (dotted line) · color = verdict', 'errChart', true),
        ]),
        el('div', { class: 'chart-row' }, [
          chartCard('Phase timings per combo', 'Stacked: Phase A · Phase B · Step 3 (seconds)', 'phaseChart', true),
        ]),
      ]);
      root.appendChild(wrap);

      // Build charts
      const runs = data.runs.slice().reverse(); // oldest first for left-to-right
      buildVerdictDonut('verdictChart', data.verdict_counts || {});
      buildErrBar('errChart', runs);
      buildPhaseBar('phaseChart', runs);
    }
    function chartCard(title, sub, canvasId, tall = false) {
      return el('div', { class: 'chart-card' }, [
        el('h3', { text: title }),
        el('p', { class: 'chart-sub', text: sub }),
        el('div', { class: 'chart-canvas-wrap ' + (tall ? 'tall' : '') }, [
          el('canvas', { id: canvasId }),
        ]),
      ]);
    }
    function buildVerdictDonut(canvasId, counts) {
      const ctx = document.getElementById(canvasId);
      if (!ctx || !window.Chart) return;
      const labels = VERDICT_ORDER.filter(v => counts[v]);
      const values = labels.map(v => counts[v]);
      const colors = labels.map(v => VERDICT_COLOR[v]);
      new Chart(ctx, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors,
            borderColor: C.bg,
            borderWidth: 2,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          cutout: '60%',
          plugins: {
            legend: { position: 'right' },
          },
        },
      });
    }
    function buildErrBar(canvasId, runs) {
      const ctx = document.getElementById(canvasId);
      if (!ctx || !window.Chart) return;
      const labels = runs.map(r => r.combo_id || r.run_id || '?');
      const values = runs.map(r => r.err || 0);
      const colors = runs.map(r => VERDICT_COLOR[r.verdict] || C.neutral);

      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: 'ERR',
            data: values,
            backgroundColor: colors,
            borderRadius: 4,
            maxBarThickness: 36,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (c) => `ERR ${c.raw.toFixed(2)}`,
              },
            },
          },
          scales: {
            x: {
              beginAtZero: true,
              grid: { color: C.border, drawBorder: false },
              ticks: { color: C.fgMuted },
            },
            y: {
              grid: { display: false },
              ticks: { color: C.fg, font: { family: 'JetBrains Mono, monospace' } },
            },
          },
        },
        plugins: [{
          id: 'errTargetLine',
          afterDraw(chart) {
            const { ctx: cctx, chartArea, scales } = chart;
            const x = scales.x.getPixelForValue(1.0);
            cctx.save();
            cctx.strokeStyle = C.accent;
            cctx.setLineDash([4, 4]);
            cctx.lineWidth = 1;
            cctx.beginPath();
            cctx.moveTo(x, chartArea.top);
            cctx.lineTo(x, chartArea.bottom);
            cctx.stroke();
            cctx.restore();
          },
        }],
      });
    }
    function buildPhaseBar(canvasId, runs) {
      const ctx = document.getElementById(canvasId);
      if (!ctx || !window.Chart) return;
      const labels = runs.map(r => r.combo_id || r.run_id || '?');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Phase A · entity extraction',     data: runs.map(r => r.phase_a_sec || 0), backgroundColor: C.shadeA, borderRadius: 4 },
            { label: 'Phase B · relationship analysis', data: runs.map(r => r.phase_b_sec || 0), backgroundColor: C.shadeB, borderRadius: 4 },
            { label: 'Step 3 · community detection',    data: runs.map(r => r.step_3_sec  || 0), backgroundColor: C.shadeC, borderRadius: 4 },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { stacked: true, grid: { display: false }, ticks: { color: C.fg, font: { family: 'JetBrains Mono, monospace' } } },
            y: { stacked: true, grid: { color: C.border, drawBorder: false }, ticks: { color: C.fgMuted, callback: (v) => fmtSec(v) } },
          },
          plugins: {
            tooltip: {
              callbacks: {
                label: (c) => `${c.dataset.label}: ${fmtSec(c.raw)}`,
                footer: (items) => {
                  const total = items.reduce((s, it) => s + it.raw, 0);
                  return `Total: ${fmtSec(total)}`;
                },
              },
            },
          },
        },
      });
    }

    // ---------- failure heatmap ----------
    function renderHeatmap(root, data) {
      const SIGNALS = [
        { key: 'empty_content_length', label: 'empty (length)' },
        { key: 'empty_content_stop',   label: 'empty (stop)' },
        { key: 'candidate_scan_empty', label: 'scan empty' },
        { key: 'zero_pair_scans',      label: 'zero-pair scans' },
        { key: 'gleaning_passes',      label: 'gleaning' },
        { key: 'extraction_timeouts',  label: 'timeouts' },
        { key: 'community_parse_fallback', label: 'json parse fallback' },
      ];
      const wrap = el('section', { class: 'bench-section' }, [
        el('h2', { class: 'section-title', text: 'Failure-signal heatmap' }),
        el('div', { class: 'heatmap-card' }, [
          el('table', { class: 'heatmap' }, [
            (() => {
              const thead = el('thead');
              const tr = el('tr');
              tr.appendChild(el('th', { text: 'Combo' }));
              for (const s of SIGNALS) tr.appendChild(el('th', { text: s.label }));
              thead.appendChild(tr);
              return thead;
            })(),
            (() => {
              const tbody = el('tbody');
              for (const r of data.runs) {
                const tr = el('tr');
                tr.appendChild(el('td', { class: 'combo-cell', text: r.combo_id || r.run_id || '?' }));
                for (const s of SIGNALS) {
                  const v = r[s.key] || 0;
                  const cls = v === 0 ? 'zero' : (v < 5 ? 'low' : 'high');
                  tr.appendChild(el('td', { class: 'signal-cell ' + cls, text: String(v) }));
                }
                tbody.appendChild(tr);
              }
              return tbody;
            })(),
          ]),
        ]),
      ]);
      root.appendChild(wrap);
    }

    // ---------- per-combo detail cards ----------
    function renderComboCards(root, data) {
      const wrap = el('section', { class: 'bench-section' }, [
        el('h2', { class: 'section-title', text: 'Per-combo detail' }),
        el('div', { class: 'combo-grid' }, data.runs.map(comboCard)),
      ]);
      root.appendChild(wrap);
    }
    function comboCard(r) {
      const v = r.verdict || 'UNKNOWN';
      const card = el('div', { class: 'combo-card' }, [
        el('div', { class: 'combo-head' }, [
          el('div', {}, [
            el('h3', { class: 'combo-id', text: r.combo_id || r.run_id || '?' }),
            el('p', { class: 'combo-batch', text: r.batch_id || '' }),
          ]),
          el('span', { class: `chip ${v}` }, [
            el('span', { class: 'dot' }),
            el('span', { text: v }),
          ]),
        ]),
        el('div', { class: 'model-trio' }, [
          el('span', { class: 'tier', text: 'primary' }),
          el('span', { class: 'model', text: r.primary_model || '—' }),
          el('span', { class: 'tier', text: 'extraction' }),
          el('span', { class: 'model', text: r.extraction_model || '—' }),
          el('span', { class: 'tier', text: 'relationship' }),
          el('span', { class: 'model', text: r.relationship_model || '—' }),
        ]),
        el('div', { class: 'combo-stats' }, [
          miniStat('Entities', num(r.entities)),
          miniStat('Rels', num(r.relationships_total)),
          miniStat('ERR', num(r.err, 2)),
          miniStat('Wall', fmtSec(r.duration_total_sec)),
        ]),
        analysisDetails(r),
      ]);
      return card;
    }
    function miniStat(label, value) {
      return el('div', { class: 'mini-stat' }, [
        el('div', { class: 'label', text: label }),
        el('div', { class: 'value', text: String(value) }),
      ]);
    }
    function analysisDetails(r) {
      const blocks = [];
      const add = (label, text) => {
        if (!text || text === '<pending LLM review>') return;
        blocks.push(el('h4', { text: label }));
        blocks.push(el('pre', { text: String(text) }));
      };
      add('Observations', r.observations);
      add('Failure patterns', r.failure_patterns);
      add('Performance', r.performance_notes);
      add('Recommendation', r.recommendation);
      add('vs previous run', r.vs_previous_run);
      add('Issue notes', r.issue_notes);
      if (blocks.length === 0) {
        blocks.push(el('p', { class: 'placeholder', text: 'No analysis fields yet — LLM review may still be pending.' }));
      }
      return el('details', { class: 'analysis' }, [
        el('summary', { text: 'Analysis & observations' }),
        el('div', { class: 'analysis-block' }, blocks),
      ]);
    }

    // ---------- findings markdown ----------
    function renderFindings(root, data) {
      const md = (data.latest_batch && data.latest_batch.findings_md) || '';
      if (!md.trim()) return; // no findings yet
      const html = window.marked ? window.marked.parse(md) : esc(md);
      const wrap = el('section', { class: 'bench-section' }, [
        el('h2', { class: 'section-title', text: 'Cross-run findings (LLM)' }),
        el('div', { class: 'findings-card' }, [
          el('div', { class: 'findings-md', html }),
        ]),
      ]);
      root.appendChild(wrap);
    }
  </script>
</body>
</html>
