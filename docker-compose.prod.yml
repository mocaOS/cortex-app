services:
  neo4j:
    image: neo4j:5.26-enterprise
    container_name: cortex-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      # Override vars are intentionally NOT prefixed NEO4J_: a raw NEO4J_*-prefixed
      # env var reaching this container is parsed by neo4j's entrypoint as a config
      # setting and rejected by strict_validation (matters under PaaS env injection).
      - NEO4J_dbms_memory_heap_initial__size=${CORTEX_NEO4J_HEAP_INITIAL:-512m}
      - NEO4J_dbms_memory_heap_max__size=${CORTEX_NEO4J_HEAP_MAX:-2G}
      - NEO4J_dbms_memory_pagecache_size=${CORTEX_NEO4J_PAGECACHE:-512m}
      # Server-side kill switch for runaway Cypher: a single unbounded query
      # would otherwise hold a pool connection + API worker thread forever.
      # 300s clears every legit workload (batched deletes/imports commit in
      # bounded inner transactions); analytic explores on huge graphs can raise it.
      - NEO4J_db_transaction_timeout=${CORTEX_NEO4J_TX_TIMEOUT:-300s}
    # Hard ceiling: on hosts packing multiple tenant stacks, one graph blowing up
    # must self-OOM in its cgroup instead of letting the kernel OOM-killer pick a
    # victim in another tenant's stack. Sized for heap max + pagecache + overhead.
    mem_limit: ${CORTEX_NEO4J_MEM_LIMIT:-4g}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: cortex-backend
    env_file:
      - .env
    environment:
      # Production hardening (secret enforcement, error sanitization, docs off).
      # Overridable: set ENVIRONMENT=development in .env to opt out.
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - NEO4J_URI=bolt://neo4j:7687
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      - PYTHONUNBUFFERED=1
      # API Key Analytics - track admin key usage (default: false)
      - TRACK_ADMIN_API_KEY_USAGE=${TRACK_ADMIN_API_KEY_USAGE:-false}
    volumes:
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      - skills_data:/app/.agents/skills
      # Persist HuggingFace model cache (cross-encoder reranker, embeddings)
      # across container restarts so we don't re-download ~80MB of models each time.
      - hf_cache:/app/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    # Hard memory ceiling so a runaway (e.g. a large export/import) self-OOMs in
    # its cgroup and restarts, instead of exhausting the host and letting the
    # kernel OOM-killer take Neo4j down with it. Tune per host via BACKEND_MEM_LIMIT.
    mem_limit: ${BACKEND_MEM_LIMIT:-4g}
    # Give uvicorn's graceful shutdown (in-flight requests, SSE streams) time to
    # drain before docker sends SIGKILL.
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # /health returns 503 while degraded (Neo4j down / schema unconfirmed);
      # give startup schema-init time before the gate counts failures.
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        # Error tracking (GlitchTip) — DSN + upload config default to this
        # project's GlitchTip (override the SENTRY_* vars; empty string disables
        # — no-colon `-` form). SENTRY_AUTH_TOKEN is a real secret and is NOT
        # defaulted — set it to upload source maps (readable prod stack traces);
        # without it the build still succeeds, traces stay minified.
        - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN_FRONTEND-https://cba599d7d91a4bc99c5024ec03eab733@glitchtip.cortex.eco/3}
        - NEXT_PUBLIC_SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-}
        - SENTRY_URL=${SENTRY_URL-https://glitchtip.cortex.eco}
        - SENTRY_ORG=${SENTRY_ORG-cortex}
        - SENTRY_PROJECT=${SENTRY_PROJECT-cortex-frontend}
        - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN:-}
    container_name: cortex-frontend
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - API_URL=http://backend:8000
      # Admin authentication
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      # Error tracking (GlitchTip) — override what env_file would inherit:
      # SENTRY_DSN in .env is the BACKEND project's DSN; the frontend server
      # runtime reports to its own project. Defaults to this project's frontend
      # GlitchTip; empty string disables (no-colon `-` form).
      - SENTRY_DSN=${SENTRY_DSN_FRONTEND-https://cba599d7d91a4bc99c5024ec03eab733@glitchtip.cortex.eco/3}
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-1g}

  nginx:
    image: nginx:alpine
    container_name: cortex-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    mem_limit: 128m

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  skills_data:
  hf_cache:
