<!doctype html>
<html class="dark marketing"><head><meta charset="utf-8"><title>Marketing · Hero</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../marketing_tokens.css">
<style>
  html, body { height: 100%; }
  body { margin: 0; background: var(--background); position: relative; overflow: hidden; font-family: var(--font-sans); }

  .decorative {
    position: absolute;
    right: -60px;
    top: 20px;
    opacity: 0.03;
    pointer-events: none;
    user-select: none;
    font-size: 20rem;
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.06em;
    color: var(--foreground);
  }

  .wrap {
    position: relative;
    padding: 48px 56px 40px;
    max-width: 980px;
  }

  .eyebrow { margin-bottom: 24px; }

  h1 {
    font-size: clamp(2.25rem, 5.5vw, 4.5rem);
    line-height: 1;
    letter-spacing: -0.06em;
    font-weight: 700;
    color: var(--foreground);
    margin: 0 0 20px;
  }
  h1 .accent { color: var(--accent); }

  .sub {
    font-size: 15px;
    line-height: 1.6;
    color: var(--muted-foreground);
    max-width: 560px;
    margin: 0 0 28px;
  }

  .ctas { display: flex; gap: 20px; flex-wrap: wrap; }

  svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
</style></head><body>
  <div class="decorative">01</div>
  <div class="wrap">
    <span class="eyebrow">Now in Private Beta</span>
    <h1>
      Intelligence is everywhere.<br>
      <span class="accent">Memory is the moat.</span>
    </h1>
    <p class="sub">
      Your competitors are plugging AI into everything. But an AI that doesn't know your
      business is just a smarter search bar. Cortex is the organizational memory layer.
    </p>
    <div class="ctas">
      <a href="#" class="mk-btn mk-btn-secondary mk-btn-lg">
        Start free — no credit card
        <svg viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
      </a>
      <a href="#" class="mk-btn mk-btn-ghost">View pricing</a>
    </div>
  </div>
</body></html>
