name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the feature you'd like to see in MOCA Library.

  - type: dropdown
    id: feature-area
    attributes:
      label: Feature Area
      description: Which area does this feature relate to?
      multiple: true
      options:
        - Document Processing Pipeline
        - Knowledge Graph & Entity Extraction
        - Search & RAG
        - Ask AI / Chat Experience
        - Collections
        - Turbo Mode / GPU Inference
        - Admin & Auth
        - Vision / OCR
        - Graph Visualization
        - Frontend UI / UX
        - API / Backend
        - Deployment / Infrastructure
        - Documentation
        - Configuration / Environment Variables
        - Other
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - New feature
        - Enhancement to existing feature
        - Performance improvement
        - Developer experience
        - Integration with external service
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: What problem does this feature solve? Why is it needed?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your ideal solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any workarounds or alternative approaches you've considered?

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Screenshots, mockups, links to related issues or docs.
