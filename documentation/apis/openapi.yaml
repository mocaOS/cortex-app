openapi: 3.0.3
info:
  title: Cortex API
  description: |
    The Cortex API provides endpoints for document management, semantic search, 
    AI-powered Q&A, knowledge graph operations, and more.

    ## Authentication
    All endpoints (except `/health`) require an API key in the `X-API-Key` header.

    ## Rate Limits
    - Standard API endpoints: 10 requests/second
    - Upload endpoints: 1 request/second

  version: 1.0.0
  contact:
    name: Cortex
    url: https://github.com/mocaOS/cortex-app
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8000
    description: Local development server
  - url: https://api.your-domain.com
    description: Production server

tags:
  - name: Health
    description: Health check and statistics
  - name: Documents
    description: Document upload and management
  - name: Custom Inputs
    description: Manual knowledge input (Q&A, text, markdown)
  - name: Search
    description: Semantic and hybrid search
  - name: Ask AI
    description: AI-powered question answering
  - name: Knowledge Graph
    description: Entity and relationship operations
  - name: Collections
    description: Document collection management
  - name: Communities
    description: Community detection and summarization
  - name: Tasks
    description: Background task management
  - name: Admin
    description: API key management, system configuration, library import/export

security:
  - ApiKeyAuth: []

paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      description: Check if the API is healthy and connected to Neo4j
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /api/stats:
    get:
      tags: [Health]
      summary: Get knowledge base statistics
      description: Returns counts of documents, chunks, entities, and relationships
      responses:
        '200':
          description: Statistics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatsResponse'

  /api/upload:
    post:
      tags: [Documents]
      summary: Upload a document
      description: Upload a file for processing into the knowledge base
      parameters:
        - name: start_processing
          in: query
          schema:
            type: boolean
            default: true
          description: Start processing immediately
        - name: collection_id
          in: query
          schema:
            type: string
          description: Assign to a collection
        - name: source
          in: query
          schema:
            type: string
            default: upload
          description: Source identifier for the document (e.g. 'youtube-transcriber', 'slack-bot'). Defaults to 'upload'.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (PDF, TXT, MD, DOCX, XLSX)
              required:
                - file
      responses:
        '200':
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          description: Invalid file type or size
        '413':
          description: File too large

  /api/documents:
    get:
      tags: [Documents]
      summary: List documents
      description: List all documents with optional pagination and filtering
      parameters:
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: collection_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Documents retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentList'
    delete:
      tags: [Documents]
      summary: Delete ALL documents
      description: |
        **Warning:** This permanently deletes all documents, chunks, and associated entities.
      responses:
        '200':
          description: All documents deleted

  /api/documents/{document_id}:
    get:
      tags: [Documents]
      summary: Get document details
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '404':
          description: Document not found
    delete:
      tags: [Documents]
      summary: Delete a document
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document deleted
        '404':
          description: Document not found

  /api/documents/{document_id}/content:
    get:
      tags: [Documents]
      summary: Get document with chunk content
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document content retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentContent'

  /api/documents/{document_id}/reprocess:
    post:
      tags: [Documents]
      summary: Reprocess a document
      description: Re-run processing pipeline on existing document
      parameters:
        - name: document_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reprocessing started

  /api/documents/delete:
    post:
      tags: [Documents]
      summary: Bulk delete documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                document_ids:
                  type: array
                  items:
                    type: string
              required:
                - document_ids
      responses:
        '200':
          description: Documents deleted

  /api/documents/reprocess:
    post:
      tags: [Documents]
      summary: Bulk reprocess documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                document_ids:
                  type: array
                  items:
                    type: string
              required:
                - document_ids
      responses:
        '200':
          description: Reprocessing started

  /api/documents/move:
    post:
      tags: [Documents]
      summary: Move documents to collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                document_ids:
                  type: array
                  items:
                    type: string
                collection_id:
                  type: string
              required:
                - document_ids
                - collection_id
      responses:
        '200':
          description: Documents moved

  /api/documents/download-zip:
    post:
      tags: [Documents]
      summary: Download documents as ZIP
      description: Stream a ZIP archive of the original uploaded files for the given document IDs. Uses ZIP64 for large collections.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                document_ids:
                  type: array
                  items:
                    type: string
                  description: List of document IDs to include in the ZIP
              required:
                - document_ids
      responses:
        '200':
          description: ZIP archive streamed successfully
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: No document IDs provided
        '404':
          description: No documents found or no files available

  /api/documents/pending:
    get:
      tags: [Documents]
      summary: List pending documents
      description: List documents waiting to be processed
      responses:
        '200':
          description: Pending documents retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentList'

  /api/documents/process-pending:
    post:
      tags: [Documents]
      summary: Process pending documents
      description: Start batch processing of all pending documents
      parameters:
        - name: concurrency
          in: query
          schema:
            type: integer
            default: 5
          description: Number of documents to process concurrently
      responses:
        '200':
          description: Processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskStartResponse'

  /api/custom-input:
    post:
      tags: [Custom Inputs]
      summary: Create custom input
      description: Add Q&A pair, text, or markdown content manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomInputCreate'
      responses:
        '200':
          description: Custom input created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomInputResponse'

  /api/custom-input/generate-topic:
    post:
      tags: [Custom Inputs]
      summary: Generate topic hint
      description: Use LLM to suggest a title for content
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
              required:
                - content
      responses:
        '200':
          description: Topic generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  topic:
                    type: string

  /api/custom-inputs:
    get:
      tags: [Custom Inputs]
      summary: List custom inputs
      responses:
        '200':
          description: Custom inputs retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  custom_inputs:
                    type: array
                    items:
                      $ref: '#/components/schemas/CustomInputItem'

  /api/custom-inputs/{input_id}:
    get:
      tags: [Custom Inputs]
      summary: Get custom input details
      parameters:
        - name: input_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Custom input retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomInputItem'

  /api/search:
    post:
      tags: [Search]
      summary: Semantic search
      description: Search documents using semantic similarity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SearchRequest'
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResponse'

  /api/ask:
    post:
      tags: [Ask AI]
      summary: Ask a question
      description: Get an AI-generated answer with sources
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: Answer generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AskResponse'

  /api/ask/stream:
    post:
      tags: [Ask AI]
      summary: Streaming answer
      description: Get a streaming answer using Server-Sent Events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: Streaming response
          content:
            text/event-stream:
              schema:
                type: string

  /api/ask/stream/thinking:
    post:
      tags: [Ask AI]
      summary: Streaming with extended thinking
      description: Stream answer with visible reasoning steps
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AskRequest'
      responses:
        '200':
          description: Streaming response with thinking
          content:
            text/event-stream:
              schema:
                type: string

  /api/graph/status:
    get:
      tags: [Knowledge Graph]
      summary: GraphRAG status
      description: Get knowledge graph statistics
      responses:
        '200':
          description: Status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphStatus'

  /api/graph/visualization:
    get:
      tags: [Knowledge Graph]
      summary: Get graph visualization data
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
        - name: include_neighbors
          in: query
          schema:
            type: boolean
            default: true
        - name: collection_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Graph data retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphVisualization'

  /api/graph/entities:
    get:
      tags: [Knowledge Graph]
      summary: List entities
      parameters:
        - name: skip
          in: query
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Entities retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityList'

  /api/graph/entity/{name}:
    get:
      tags: [Knowledge Graph]
      summary: Get entity details
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entity details retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityDetails'

    patch:
      tags: [Knowledge Graph]
      summary: Update entity
      description: Update an entity's name and/or description. Name changes add the old name to aliases. Rejects duplicate names.
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: New entity name
                description:
                  type: string
                  description: New entity description
      responses:
        '200':
          description: Entity updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  name:
                    type: string
                  type:
                    type: string
                  description:
                    type: string
                  aliases:
                    type: array
                    items:
                      type: string
        '400':
          description: Validation error (empty name, duplicate name, no updates)

  /api/graph/entity/{name}/relationships:
    get:
      tags: [Knowledge Graph]
      summary: Get entity relationships
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
        - name: max_hops
          in: query
          schema:
            type: integer
            default: 2
      responses:
        '200':
          description: Relationships retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityRelationships'

  /api/graph/subgraph:
    post:
      tags: [Knowledge Graph]
      summary: Get subgraph
      description: Get a focused subgraph for specific entities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_names:
                  type: array
                  items:
                    type: string
                max_hops:
                  type: integer
                  default: 2
                limit:
                  type: integer
                  default: 50
              required:
                - entity_names
      responses:
        '200':
          description: Subgraph retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GraphVisualization'

  /api/graph/search:
    get:
      tags: [Knowledge Graph]
      summary: Search entities
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entities found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityList'

  /api/entities/duplicates:
    get:
      tags: [Knowledge Graph]
      summary: Find duplicate entity candidates
      description: >
        Returns groups of entities that are potential duplicates based on name similarity.
        Uses fuzzy string matching to identify entities that likely refer to the same thing
        but were not caught by automatic resolution during extraction.
      parameters:
        - name: threshold
          in: query
          schema:
            type: number
            default: 0.85
            minimum: 0.5
            maximum: 1.0
          description: Similarity threshold for duplicate detection (0.5 to 1.0)
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Maximum number of duplicate groups to return
      responses:
        '200':
          description: Duplicate candidates retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DuplicateCandidates'

  /api/entities/merge:
    post:
      tags: [Knowledge Graph]
      summary: Merge duplicate entities
      description: >
        Merges one or more duplicate entities into a canonical entity. All relationships,
        chunk mentions, and community memberships from the merged entities are transferred
        to the canonical entity. Merged entities are removed from the graph.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntityMergeRequest'
      responses:
        '200':
          description: Entities merged successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityMergeResponse'
        '404':
          description: Canonical entity not found
        '400':
          description: Invalid merge request (e.g., merging entity into itself)

  /api/entities/merge-history:
    get:
      tags: [Knowledge Graph]
      summary: Get entity merge history
      description: >
        Returns a chronological log of entity merge operations, including which entities
        were merged into which canonical entity and when.
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
          description: Maximum number of history entries to return
      responses:
        '200':
          description: Merge history retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MergeHistoryResponse'

  /api/collections:
    get:
      tags: [Collections]
      summary: List collections
      responses:
        '200':
          description: Collections retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionList'
    post:
      tags: [Collections]
      summary: Create collection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionCreate'
      responses:
        '200':
          description: Collection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collection'

  /api/collections/{collection_id}:
    get:
      tags: [Collections]
      summary: Get collection details
      parameters:
        - name: collection_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Collection retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionDetails'
    put:
      tags: [Collections]
      summary: Update collection name or description
      parameters:
        - name: collection_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CollectionUpdate'
      responses:
        '200':
          description: Collection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectionDetails'
        '400':
          description: Cannot rename the default collection
        '404':
          description: Collection not found
    delete:
      tags: [Collections]
      summary: Delete collection
      parameters:
        - name: collection_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Collection deleted

  /api/collections/{collection_id}/documents/{document_id}:
    post:
      tags: [Collections]
      summary: Add document to collection
      parameters:
        - name: collection_id
          in: path
          required: true
          schema:
            type: string
        - name: document_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document added

  /api/collections/{collection_id}/entities:
    get:
      tags: [Collections]
      summary: Get collection entities
      parameters:
        - name: collection_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Entities retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityList'

  /api/graph/relationships:
    delete:
      tags: [Knowledge Graph]
      summary: Delete all relationships
      description: >
        Delete ALL relationships between entities (excluding chunk MENTIONS links).
        Useful before re-running relationship analysis with different settings or models.
      responses:
        '200':
          description: Relationships deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  relationships_deleted:
                    type: integer
                    description: Number of relationships deleted

  /api/graph/relationships/analyze:
    post:
      tags: [Knowledge Graph]
      summary: Analyze cross-document relations
      description: >
        Triggers Phase B of the extraction pipeline. The main (large) model
        analyzes all entities and discovers cross-document relations.
        Run this after batch document processing to build the relationship graph.
      parameters:
        - name: collection_id
          in: query
          schema:
            type: string
          description: Scope to a specific collection (None = global)
        - name: scope
          in: query
          schema:
            type: string
            default: full
            enum: [recent, full]
          description: "'recent' for new entities, 'full' for all"
      responses:
        '200':
          description: Analysis task started
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                  message:
                    type: string
                  tip:
                    type: string

  /api/graph/communities:
    get:
      tags: [Communities]
      summary: List communities
      parameters:
        - name: collection_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Communities retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityList'
    delete:
      tags: [Communities]
      summary: Delete ALL communities
      description: Deletes all communities and unlinks their member entities. Entities are preserved.
      responses:
        '200':
          description: All communities deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  communities_deleted:
                    type: integer
                  entities_unlinked:
                    type: integer

  /api/graph/communities/detect:
    post:
      tags: [Communities]
      summary: Detect communities
      description: Run community detection algorithm
      parameters:
        - name: min_size
          in: query
          schema:
            type: integer
            default: 3
        - name: collection_id
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Detection completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  communities_detected:
                    type: integer
                  entities_clustered:
                    type: integer

  /api/graph/communities/{community_id}:
    get:
      tags: [Communities]
      summary: Get community details
      parameters:
        - name: community_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Community retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityDetails'
    delete:
      tags: [Communities]
      summary: Delete a specific community
      description: Deletes the community and unlinks its member entities. Entities are preserved.
      parameters:
        - name: community_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Community deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  community_id:
                    type: integer
                  entities_unlinked:
                    type: integer
        '404':
          description: Community not found

  /api/graph/communities/summarize:
    post:
      tags: [Communities]
      summary: Generate community summaries
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                force_regenerate:
                  type: boolean
                  default: false
                collection_id:
                  type: string
      responses:
        '200':
          description: Summaries generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  summaries_generated:
                    type: integer
                  summaries_skipped:
                    type: integer

  /api/graph/communities/search:
    get:
      tags: [Communities]
      summary: Search communities
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Communities found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommunityList'

  /api/cleanup/orphaned-entities:
    post:
      tags: [Knowledge Graph]
      summary: Clean up orphaned entities and communities
      description: >
        Remove entities not connected to any document chunks and communities
        with no member entities. Use this after bulk document deletion to
        clean up stale graph data.
      responses:
        '200':
          description: Cleanup completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  orphaned_entities_removed:
                    type: integer
                  orphaned_communities_removed:
                    type: integer

  /api/tasks:
    get:
      tags: [Tasks]
      summary: List background tasks
      responses:
        '200':
          description: Tasks retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/TaskProgress'

  /api/tasks/{task_id}:
    get:
      tags: [Tasks]
      summary: Get task status
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskProgress'
    delete:
      tags: [Tasks]
      summary: Cancel task
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task cancelled

  /api/tasks/{task_id}/result:
    get:
      tags: [Tasks]
      summary: Get task result
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task result retrieved

  /api/tasks/cleanup:
    post:
      tags: [Tasks]
      summary: Clean up old tasks
      description: Remove completed tasks older than specified age
      responses:
        '200':
          description: Cleanup completed

  /api/admin/config:
    get:
      tags: [Admin]
      summary: Get system configuration
      description: Returns current system settings (model names, API base URLs, context windows, concurrency settings). No API keys or secrets are exposed.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: System configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  openai_model:
                    type: string
                    description: Primary LLM model name
                  openai_api_base:
                    type: string
                    description: Primary LLM API base URL
                  extraction_model:
                    type: string
                    description: Entity extraction model name
                  extraction_api_base:
                    type: string
                    description: Extraction model API base URL
                  extraction_max_context:
                    type: integer
                    description: Max context window tokens for entity extraction
                  relationship_model:
                    type: string
                    description: Relationship extraction model name
                  relationship_api_base:
                    type: string
                    description: Relationship model API base URL
                  relationship_max_context:
                    type: integer
                    description: Max context window tokens for relationship analysis
                  concurrent_relations:
                    type: integer
                    description: Concurrent per-chunk relationship extractions per document
                  parallel_relationship_batches:
                    type: integer
                    description: Relationship analysis batches processed in parallel
                  vision_model_available:
                    type: boolean
                  vision_model:
                    type: string
                  vision_api_base:
                    type: string
                  vision_max_concurrent:
                    type: integer
                  embedding_model:
                    type: string
                  embedding_dimension:
                    type: integer
                  embedding_api_base:
                    type: string
                  embedding_send_dimensions:
                    type: boolean
        '401':
          description: Admin authentication required

  /api/admin/api-keys:
    get:
      tags: [Admin]
      summary: List API keys
      responses:
        '200':
          description: API keys retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyList'
    post:
      tags: [Admin]
      summary: Create API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
      responses:
        '200':
          description: API key created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreated'

  /api/admin/api-keys/{key_id}:
    get:
      tags: [Admin]
      summary: Get API key details
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKey'
    patch:
      tags: [Admin]
      summary: Update API key
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyUpdate'
      responses:
        '200':
          description: API key updated
    delete:
      tags: [Admin]
      summary: Delete API key
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key deleted

  /api/admin/api-keys/{key_id}/revoke:
    post:
      tags: [Admin]
      summary: Revoke API key
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key revoked

  /api/admin/api-keys/{key_id}/activate:
    post:
      tags: [Admin]
      summary: Activate API key
      parameters:
        - name: key_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: API key activated

  /api/admin/reset:
    post:
      tags: [Admin]
      summary: System reset
      description: |
        Selectively delete data from the system. This is a destructive operation that cannot be undone.
        When documents are deleted, associated data is also cleaned up: merge history (deduplication audit trail),
        system metadata (staleness timestamps), and all graph data (entities, relationships, communities).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemResetRequest'
      responses:
        '200':
          description: System reset completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemResetResponse'

  /api/admin/export:
    post:
      tags: [Admin]
      summary: Start library export
      description: |
        Start a background task that exports the entire library (documents, knowledge graph,
        embeddings, communities, collections, and all metadata) as a ZIP64 archive.
        Only one export or import can run at a time.
      responses:
        '200':
          description: Export task started
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    description: Task ID for polling progress
                  status:
                    type: string
                    example: pending
                  message:
                    type: string
                    example: Export started
        '409':
          description: An export or import is already in progress

  /api/admin/export/{task_id}/download:
    get:
      tags: [Admin]
      summary: Download library export
      description: |
        Download a completed library export as a ZIP file. The export must have
        completed successfully (poll the task status first). Streams the file
        in 1MB chunks.
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: The export task ID
      responses:
        '200':
          description: ZIP file stream
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Export not ready (still running or failed)
        '404':
          description: Task not found or export file cleaned up

  /api/admin/import:
    post:
      tags: [Admin]
      summary: Import library from export archive
      description: |
        Upload a library export ZIP and start a background import task.
        Two modes are available:
        - **clean** (default): Requires the target instance to be empty
        - **replace**: Automatically wipes all existing data before importing

        The import validates the archive structure, checks embedding model
        compatibility, and restores all nodes, relationships, and files.
      parameters:
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [clean, replace]
            default: clean
          description: Import mode
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The export ZIP file
              required:
                - file
      responses:
        '200':
          description: Import task started
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    description: Task ID for polling progress
                  status:
                    type: string
                    example: pending
                  message:
                    type: string
                    example: "Import started (mode: clean)"
        '409':
          description: An export or import is already in progress

  /api/admin/import/upload/start:
    post:
      tags: [Admin]
      summary: Start a chunked import upload session
      description: |
        Open a chunked upload session for a library export ZIP. Use this
        instead of the single-request `/api/admin/import` when uploading
        through reverse proxies with body-read timeouts (e.g. Traefik v3
        defaults to 60s): each chunk is a short independent request.
        The web UI always uses this flow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                total_size:
                  type: integer
                  description: Total ZIP size in bytes
                filename:
                  type: string
              required:
                - total_size
      responses:
        '200':
          description: Upload session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  upload_id:
                    type: string
                  received:
                    type: integer
                    example: 0
        '409':
          description: An export or import is already in progress

  /api/admin/import/upload/{upload_id}/chunk:
    put:
      tags: [Admin]
      summary: Upload one chunk of an import archive
      description: |
        Append raw bytes at the given offset. Offsets must be contiguous —
        on mismatch (e.g. a retried chunk that already landed) the response
        is 409 with the server's current byte count so the client can resync.
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
        - name: offset
          in: query
          required: true
          schema:
            type: integer
            minimum: 0
          description: Byte offset this chunk starts at
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Chunk appended
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: integer
                    description: Total bytes received so far
        '400':
          description: Upload exceeds declared total_size (session discarded)
        '404':
          description: Upload session not found or expired
        '409':
          description: Offset mismatch; detail contains the server's byte count

  /api/admin/import/upload/{upload_id}/finish:
    post:
      tags: [Admin]
      summary: Finish a chunked upload and start the import
      description: |
        Validates that all declared bytes arrived, then starts the same
        background import task as `/api/admin/import`.
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
        - name: mode
          in: query
          required: false
          schema:
            type: string
            enum: [clean, replace]
            default: clean
      responses:
        '200':
          description: Import task started
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                  status:
                    type: string
                    example: pending
                  message:
                    type: string
        '400':
          description: Upload incomplete (session kept; continue uploading)
        '404':
          description: Upload session not found or expired
        '409':
          description: An export or import is already in progress

  /api/admin/import/upload/{upload_id}:
    delete:
      tags: [Admin]
      summary: Abort a chunked import upload
      description: Discard the upload session and its partial file. Idempotent.
      parameters:
        - name: upload_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Upload aborted

  /api/instance/status:
    get:
      tags: [Admin]
      summary: Instance status (redeploy safety)
      description: >
        Single-call operational snapshot for deploy automation to decide whether
        this instance can be safely restarted/upgraded. `safe_to_redeploy` is
        false while destructible work is in flight — documents being
        processed/extracted, running background tasks (held in an in-memory store
        a restart would lose), or an active AskAI/research query (a restart kills
        the stream). Pending documents persist and resume after a restart, so they
        are reported but never block. Requires `manage` permission.
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Instance status snapshot
          content:
            application/json:
              schema:
                type: object
                properties:
                  safe_to_redeploy:
                    type: boolean
                    description: False while any destructible work is in flight
                  reasons:
                    type: array
                    items:
                      type: string
                    description: Active blockers; empty when safe to redeploy
                  processing_count:
                    type: integer
                    description: Documents currently processing/extracting (blocks redeploy)
                  pending_count:
                    type: integer
                    description: Documents queued (informational; resumes after restart)
                  failed_count:
                    type: integer
                    description: Documents in failed state
                  running_task_count:
                    type: integer
                    description: Pending/running background tasks (blocks redeploy)
                  running_tasks:
                    type: array
                    description: Summaries of in-flight background tasks
                    items:
                      type: object
                      properties:
                        task_id:
                          type: string
                        task_type:
                          type: string
                        status:
                          type: string
                        progress_percent:
                          type: number
                        message:
                          type: string
                        started_at:
                          type: string
                          format: date-time
                          nullable: true
                  active_query_count:
                    type: integer
                    description: In-flight AskAI/research queries (blocks redeploy)
                  last_query_at:
                    type: string
                    format: date-time
                    nullable: true
                    description: ISO timestamp of the most recent AskAI query
                  last_relationship_analysis_at:
                    type: string
                    format: date-time
                    nullable: true
                  last_community_detection_at:
                    type: string
                    format: date-time
                    nullable: true
                  last_entity_merge_at:
                    type: string
                    format: date-time
                    nullable: true
                  neo4j_connected:
                    type: boolean
                  checked_at:
                    type: string
                    format: date-time
                    description: ISO timestamp when this snapshot was taken
        '401':
          description: Manage authentication required

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key

  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: healthy
        neo4j:
          type: string
          example: connected
        version:
          type: string
          example: 1.0.0

    StatsResponse:
      type: object
      properties:
        document_count:
          type: integer
        chunk_count:
          type: integer
        entity_count:
          type: integer
        relationship_count:
          type: integer
        per_chunk_relationship_count:
          type: integer
          description: Relations discovered in Step 1 (per-chunk extraction)
        collection_count:
          type: integer

    Document:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        file_type:
          type: string
        file_size:
          type: integer
        upload_date:
          type: string
          format: date-time
        processing_status:
          type: string
          enum: [pending, processing, extracting_entities, completed, failed]
        chunk_count:
          type: integer
        collection_id:
          type: string
        source:
          type: string
          description: Origin of the document (e.g. 'upload', 'custom_input', or a custom source set via API)

    DocumentList:
      type: object
      properties:
        documents:
          type: array
          items:
            $ref: '#/components/schemas/Document'
        total:
          type: integer

    DocumentContent:
      type: object
      properties:
        id:
          type: string
        filename:
          type: string
        chunks:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              content:
                type: string
              chunk_index:
                type: integer

    CustomInputCreate:
      type: object
      properties:
        input_type:
          type: string
          enum: [qa, text, markdown]
        content:
          type: string
        answer:
          type: string
          description: Required for Q&A type
        collection_id:
          type: string
        source:
          type: string
          description: Custom source identifier (defaults to 'custom_input' if not set)
      required:
        - input_type
        - content

    CustomInputResponse:
      type: object
      properties:
        id:
          type: string
        input_type:
          type: string
        filename:
          type: string
        source:
          type: string
          description: Origin of the document
        created_at:
          type: string
          format: date-time

    CustomInputItem:
      type: object
      properties:
        id:
          type: string
        input_type:
          type: string
        content:
          type: string
        answer:
          type: string
        filename:
          type: string
        collection_id:
          type: string
        created_at:
          type: string
          format: date-time

    SearchRequest:
      type: object
      properties:
        query:
          type: string
        top_k:
          type: integer
          default: 10
        collection_id:
          type: string
        use_hybrid:
          type: boolean
          default: true
        use_reranking:
          type: boolean
          default: true
      required:
        - query

    SearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
            properties:
              content:
                type: string
              score:
                type: number
              document_id:
                type: string
              chunk_id:
                type: string
              metadata:
                type: object
        total:
          type: integer
        query:
          type: string
        search_time_ms:
          type: integer

    AskRequest:
      type: object
      properties:
        question:
          type: string
        use_graph:
          type: boolean
          default: true
        max_hops:
          type: integer
          default: 2
        use_reranking:
          type: boolean
          default: true
        use_agentic:
          type: boolean
          default: false
        use_fast_search:
          type: boolean
          default: false
        collection_id:
          type: string
        conversation_history:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
                enum: [user, assistant]
              content:
                type: string
      required:
        - question

    AskResponse:
      type: object
      properties:
        answer:
          type: string
        sources:
          type: array
          items:
            type: object
            properties:
              content:
                type: string
              document_id:
                type: string
              filename:
                type: string
              score:
                type: number
        graph_context:
          type: object
          properties:
            entities:
              type: array
              items:
                type: string
            relationships:
              type: array
              items:
                type: object
            communities:
              type: array
              items:
                type: object
        retrieval_stats:
          type: object

    GraphStatus:
      type: object
      properties:
        enabled:
          type: boolean
        entity_count:
          type: integer
        relationship_count:
          type: integer
        community_count:
          type: integer
        last_extraction:
          type: string
          format: date-time

    GraphVisualization:
      type: object
      properties:
        nodes:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              type:
                type: string
              description:
                type: string
              mention_count:
                type: integer
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              target:
                type: string
              type:
                type: string
              description:
                type: string

    EntityList:
      type: object
      properties:
        entities:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              description:
                type: string
              mention_count:
                type: integer
        total:
          type: integer

    EntityDetails:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        mention_count:
          type: integer
        documents:
          type: array
          items:
            type: string
        first_seen:
          type: string
          format: date-time

    EntityRelationships:
      type: object
      properties:
        entity:
          type: string
        relationships:
          type: array
          items:
            type: object
            properties:
              target:
                type: string
              type:
                type: string
              description:
                type: string
              hop:
                type: integer

    CollectionCreate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
      required:
        - name

    CollectionUpdate:
      type: object
      properties:
        name:
          type: string
          description: New collection name (1-100 characters)
        description:
          type: string
          description: New collection description (max 500 characters)

    Collection:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        created_at:
          type: string
          format: date-time

    CollectionDetails:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        document_count:
          type: integer
        entity_count:
          type: integer
        relationship_count:
          type: integer
        community_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CollectionList:
      type: object
      properties:
        collections:
          type: array
          items:
            $ref: '#/components/schemas/Collection'

    CommunityList:
      type: object
      properties:
        communities:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              summary:
                type: string
              entity_count:
                type: integer
        total:
          type: integer

    CommunityDetails:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        summary:
          type: string
        entities:
          type: array
          items:
            type: object
        relationships:
          type: array
          items:
            type: object

    TaskProgress:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string
          enum: [pending, running, completed, failed]
        progress:
          type: integer
        message:
          type: string
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time

    TaskStartResponse:
      type: object
      properties:
        task_id:
          type: string
        status:
          type: string

    ApiKeyCreate:
      type: object
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
            enum: [read, manage, admin]
      required:
        - name
        - permissions

    ApiKeyUpdate:
      type: object
      properties:
        name:
          type: string
        permissions:
          type: array
          items:
            type: string
            enum: [read, manage, admin]

    ApiKey:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key_prefix:
          type: string
        permissions:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, revoked]
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time

    ApiKeyCreated:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        key:
          type: string
          description: Full API key (only shown once)
        permissions:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time

    ApiKeyList:
      type: object
      properties:
        api_keys:
          type: array
          items:
            $ref: '#/components/schemas/ApiKey'

    DuplicateGroup:
      type: object
      properties:
        canonical:
          type: string
          description: The entity name with the highest mention count in this group
        duplicates:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
                description: Entity name
              type:
                type: string
                description: Entity type
              similarity:
                type: number
                description: Similarity score relative to the canonical name
              mention_count:
                type: integer
                description: Number of chunk mentions for this entity
          description: List of entities similar to the canonical entity
        similarity:
          type: number
          description: Average similarity score within this group

    DuplicateCandidates:
      type: object
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/DuplicateGroup'
        total_groups:
          type: integer
          description: Total number of duplicate groups found
        threshold:
          type: number
          description: Similarity threshold used for detection

    EntityMergeRequest:
      type: object
      required:
        - canonical
        - merge
      properties:
        canonical:
          type: string
          description: The name of the entity to keep (canonical/primary entity)
        merge:
          type: array
          items:
            type: string
          description: List of entity names to merge into the canonical entity

    EntityMergeResponse:
      type: object
      properties:
        canonical:
          type: string
          description: The canonical entity name that was kept
        merged:
          type: array
          items:
            type: string
          description: Entity names that were merged and removed
        relationships_transferred:
          type: integer
          description: Number of relationships moved to the canonical entity
        mentions_transferred:
          type: integer
          description: Number of chunk mentions moved to the canonical entity
        aliases_added:
          type: array
          items:
            type: string
          description: Aliases added to the canonical entity from merged entities

    MergeHistoryEntry:
      type: object
      properties:
        canonical:
          type: string
          description: The canonical entity name
        merged:
          type: array
          items:
            type: string
          description: Entity names that were merged
        relationships_transferred:
          type: integer
        mentions_transferred:
          type: integer
        merged_at:
          type: string
          format: date-time
          description: When the merge was performed

    MergeHistoryResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/MergeHistoryEntry'
        total:
          type: integer
          description: Total number of merge history entries

    SystemResetRequest:
      type: object
      properties:
        delete_documents:
          type: boolean
          default: true
          description: Delete all documents, chunks, entities, relationships, communities, merge history, and system metadata
        delete_uploaded_files:
          type: boolean
          default: true
          description: Delete uploaded files from disk
        delete_custom_inputs:
          type: boolean
          default: true
          description: Delete custom input files from disk
        delete_collections:
          type: boolean
          default: true
          description: Delete all non-default collections
        delete_api_keys:
          type: boolean
          default: false
          description: Delete all API keys (dangerous — defaults to false)

    SystemResetResponse:
      type: object
      properties:
        message:
          type: string
          description: Summary message of what was deleted
        documents_deleted:
          type: integer
          description: Number of documents deleted
        entities_removed:
          type: integer
          description: Number of entities removed
        communities_removed:
          type: integer
          description: Number of communities removed
        merge_history_deleted:
          type: integer
          description: Number of merge history records deleted
        system_meta_deleted:
          type: integer
          description: Number of system metadata records deleted
        collections_deleted:
          type: integer
          description: Number of collections deleted
        api_keys_deleted:
          type: integer
          description: Number of API keys deleted
        uploaded_files_deleted:
          type: integer
          description: Number of uploaded files deleted
        custom_inputs_deleted:
          type: integer
          description: Number of custom input files deleted
        processing_cancelled:
          type: integer
          description: Number of active processing tasks cancelled

    LibraryExportManifest:
      type: object
      properties:
        version:
          type: string
          description: Export format version
          example: "1.0"
        export_date:
          type: string
          format: date-time
          description: When the export was created
        embedding_model:
          type: string
          description: Embedding model used by the source instance
        embedding_dimension:
          type: integer
          description: Embedding vector dimension
        stats:
          type: object
          description: Counts of exported items
          properties:
            document_count:
              type: integer
            chunk_count:
              type: integer
            entity_count:
              type: integer
            relationship_count:
              type: integer
            community_count:
              type: integer
            collection_count:
              type: integer

    LibraryImportResult:
      type: object
      properties:
        documents_imported:
          type: integer
        chunks_imported:
          type: integer
        entities_imported:
          type: integer
        relationships_imported:
          type: integer
        communities_imported:
          type: integer
        collections_imported:
          type: integer
        files_imported:
          type: integer
        merge_history_imported:
          type: integer
        embedding_compatible:
          type: boolean
          description: Whether the source and target embedding configs match
        warnings:
          type: array
          items:
            type: string
          description: Any warnings encountered during import (e.g., embedding mismatch)
