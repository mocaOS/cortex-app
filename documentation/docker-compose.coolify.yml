# =============================================================================
# MOCA Library Documentation - Docker Compose for Coolify
# =============================================================================
# Deploy this documentation site using Coolify's Docker Compose resource.
#
# Setup Instructions:
# 1. Create a new Docker Compose resource in Coolify
# 2. Point to your git repository
# 3. Set compose file path: documentation/docker-compose.coolify.yml
# 4. Configure environment variables (optional):
#    - DOCS_URL: Your documentation domain (e.g., https://docs.moca.example.com)
# 5. Configure domain in Coolify
# 6. Deploy!
#
# =============================================================================

services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Pass DOCS_URL at build time for absolute llms.txt links
        - DOCS_URL=${DOCS_URL:-http://localhost:3000}
    environment:
      - NODE_ENV=production
      # Coolify magic variable for domain exposure
      - SERVICE_FQDN_DOCS_3000=${DOCS_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # Resource limits (adjust as needed)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
