# Coolify-compatible docker-compose for production deployment
# Deploy this via Coolify's Docker Compose deployment option
# 
# IMPORTANT: In Coolify, set the "Base Directory" to "/" (the repo root)
# so that build contexts resolve correctly.

services:
  neo4j:
    image: neo4j:5.15.0-enterprise
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=512m
      # Disable strict validation to ignore unknown env vars like NEO4J_URI (which is for backend connection, not Neo4j config)
      - NEO4J_server_config_strict__validation__enabled=false
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      # Neo4j Configuration
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
      
      # OpenAI / LiteLLM Configuration
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      
      # Embedding Configuration
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - USE_OPENAI_EMBEDDINGS=${USE_OPENAI_EMBEDDINGS:-true}
      
      # Upload Configuration
      - UPLOAD_DIR=/app/uploads
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      
      # Chunking Configuration
      - CHUNK_SIZE=${CHUNK_SIZE:-500}
      - CHUNK_OVERLAP=${CHUNK_OVERLAP:-50}
      - CHUNK_BY=${CHUNK_BY:-sentence}
      - SENTENCES_PER_CHUNK=${SENTENCES_PER_CHUNK:-5}
      
      # GraphRAG Configuration
      - ENABLE_GRAPH_EXTRACTION=${ENABLE_GRAPH_EXTRACTION:-true}
      - MAX_GRAPH_HOPS=${MAX_GRAPH_HOPS:-2}
      - CONCURRENT_EXTRACTIONS=${CONCURRENT_EXTRACTIONS:-20}
      
      # Enhanced RAG Configuration
      - ENABLE_RERANKING=${ENABLE_RERANKING:-true}
      - RERANKING_MODEL=${RERANKING_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      - ENABLE_HYBRID_SEARCH=${ENABLE_HYBRID_SEARCH:-true}
      - VECTOR_WEIGHT=${VECTOR_WEIGHT:-0.5}
      - KEYWORD_WEIGHT=${KEYWORD_WEIGHT:-0.3}
      - GRAPH_WEIGHT=${GRAPH_WEIGHT:-0.2}
      - MAX_CONVERSATION_HISTORY=${MAX_CONVERSATION_HISTORY:-6}
      - ENABLE_AGENTIC_RAG=${ENABLE_AGENTIC_RAG:-true}
      - MAX_AGENTIC_STEPS=${MAX_AGENTIC_STEPS:-3}
      
      # Community Detection & Graph Summarization
      - ENABLE_COMMUNITY_DETECTION=${ENABLE_COMMUNITY_DETECTION:-true}
      - MIN_COMMUNITY_SIZE=${MIN_COMMUNITY_SIZE:-3}
      - MAX_COMMUNITIES=${MAX_COMMUNITIES:-50}
      - ENABLE_GRAPH_SUMMARIZATION=${ENABLE_GRAPH_SUMMARIZATION:-true}
      
      # Semantic Entity Resolution
      - ENABLE_SEMANTIC_ENTITY_RESOLUTION=${ENABLE_SEMANTIC_ENTITY_RESOLUTION:-true}
      - ENTITY_SIMILARITY_THRESHOLD=${ENTITY_SIMILARITY_THRESHOLD:-0.85}
      
      # Collection-Level Graphs
      - ENABLE_COLLECTIONS=${ENABLE_COLLECTIONS:-true}
      - DEFAULT_COLLECTION=${DEFAULT_COLLECTION:-default}
      
      # Extended Thinking / Reasoning Visibility
      - STREAM_REASONING_STEPS=${STREAM_REASONING_STEPS:-true}
      - SHOW_RETRIEVAL_STATS=${SHOW_RETRIEVAL_STATS:-true}
      
      - PYTHONUNBUFFERED=1
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    environment:
      - API_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Coolify will handle the port mapping and reverse proxy
    expose:
      - "3000"

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
