# Docker Compose for Coolify deployment
# Uses Coolify magic variables for dynamic URL generation
# Deploy this via Coolify's Docker Compose resource
#
# Only REQUIRED env vars are declared below. Everything else — embedding settings,
# vision/graph-extraction overrides, relationship & community tuning, feature
# flags, pricing caps, branding (logo/accent color), admin email, etc. — defaults to
# sensible values in backend/app/config.py. To override one, add it as a Coolify env
# var AND add a matching `- VAR=${VAR}` line under `environment:` below (and a `- VAR=${VAR}`
# under `build.args:` too if it is a NEXT_PUBLIC_* var that needs build-time inlining).
# See handbook/04-configuration.md for the full catalogue.

services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      # Username is hardcoded to 'neo4j' - don't set NEO4J_USER in Coolify env vars!
      - NEO4J_AUTH=neo4j/${SERVICE_PASSWORD_NEO4J}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      # NOTE: the override vars below are intentionally NOT prefixed NEO4J_.
      # Coolify injects every app-level env var into every service container,
      # and neo4j's entrypoint turns any NEO4J_*-prefixed env var into a config
      # setting (NEO4J_HEAP_INITIAL -> HEAP.INITIAL), which strict_validation
      # rejects -> neo4j refuses to boot. CORTEX_* names are invisible to it.
      - NEO4J_dbms_memory_heap_initial__size=${CORTEX_NEO4J_HEAP_INITIAL:-512m}
      - NEO4J_dbms_memory_heap_max__size=${CORTEX_NEO4J_HEAP_MAX:-2G}
      - NEO4J_dbms_memory_pagecache_size=${CORTEX_NEO4J_PAGECACHE:-512m}
      # Server-side kill switch for runaway Cypher: a single unbounded query
      # would otherwise hold a pool connection + API worker thread forever.
      # 300s clears every legit workload (batched deletes/imports commit in
      # bounded inner transactions); analytic explores on huge graphs can raise it.
      - NEO4J_db_transaction_timeout=${CORTEX_NEO4J_TX_TIMEOUT:-300s}
    # Hard ceiling so one tenant's graph blowing up self-OOMs in its cgroup
    # instead of letting the kernel OOM-killer pick another stack's container.
    mem_limit: ${CORTEX_NEO4J_MEM_LIMIT:-4g}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      # --- Database (required) ---
      - NEO4J_URI=bolt://neo4j:7687
      # NEO4J_USER not needed - backend defaults to 'neo4j'
      - NEO4J_PASSWORD=${SERVICE_PASSWORD_NEO4J}
      # --- LLM (required) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      # --- Observability (Langfuse) — optional (no keys = no tracing) ---
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-}
      - LANGFUSE_TRACING_ENABLED=${LANGFUSE_TRACING_ENABLED:-true}
      - LANGFUSE_SAMPLE_RATE=${LANGFUSE_SAMPLE_RATE:-1.0}
      # Content masking: false (default) redacts all prompt/completion text before
      # export; true logs full content for debugging.
      - LANGFUSE_LOG_EXTENDED=${LANGFUSE_LOG_EXTENDED:-false}
      # Optional trace-environment label (e.g. set per self-host instance).
      # Empty → backend falls back to the deployment ENVIRONMENT at init.
      - LANGFUSE_TRACING_ENVIRONMENT=${LANGFUSE_TRACING_ENVIRONMENT:-}
      # --- Runtime paths (do not change) ---
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      - PYTHONUNBUFFERED=1
      # --- Backend public URL (set BACKEND_URL in Coolify, e.g. https://api-kg.cortex.qwellco.de) ---
      - SERVICE_FQDN_BACKEND_8000=${BACKEND_URL}
      # --- Admin authentication ---
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    volumes:
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      - skills_data:/app/.agents/skills
      # Persist HuggingFace model cache (cross-encoder reranker, embeddings)
      # across container restarts so we don't re-download ~80MB of models each time.
      # Coolify auto-creates named volumes; survives redeploys but not "Cleanup volumes".
      - hf_cache:/app/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    # Hard memory ceiling so a runaway (e.g. a large export/import) self-OOMs in
    # its cgroup and restarts, instead of exhausting the host and letting the
    # kernel OOM-killer take Neo4j down with it (the original incident). Set
    # BACKEND_MEM_LIMIT in Coolify env to match this host — keep it above ~2G
    # steady-state and below (host RAM − Neo4j ~3G − frontend − OS headroom).
    mem_limit: ${BACKEND_MEM_LIMIT:-4g}
    # Give uvicorn's graceful shutdown (in-flight requests, SSE streams) time to
    # drain before docker sends SIGKILL.
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Build-time arg for the public API URL (set BACKEND_URL in Coolify)
        - NEXT_PUBLIC_API_URL=${BACKEND_URL}
        - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL:-}
        - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
    environment:
      # Expose frontend at kg subdomain on port 3000 (set FRONTEND_URL in Coolify)
      - SERVICE_FQDN_FRONTEND_3000=${FRONTEND_URL}
      # Public API URL for client-side requests
      - NEXT_PUBLIC_API_URL=${BACKEND_URL}
      # Internal API URL for server-side requests
      - API_URL=http://backend:8000
      # Branding (NEXT_PUBLIC_ for build-time client inlining, non-prefixed for runtime Server Components)
      - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL:-}
      - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
      - ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
      # Admin authentication (must match backend). ADMIN_EMAIL is compared literally
      # by the frontend (frontend/src/lib/auth.ts) — without it, it falls back to its
      # hardcoded "admin@example.com" default and every real login is rejected.
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-1g}

  backup:
    # Nightly online backup of the instance's data: APOC logical export of the
    # graph + tar of the uploads/custom_inputs volumes, BACKUP_RETENTION_DAYS
    # rotation. Backups land in the `backups` named volume; ship it off-host
    # with restic/rclone for disaster recovery.
    # Manual run:  docker compose exec backup /backup.sh
    # Restore:     see ops/backup/backup.sh header.
    build:
      context: ./ops/backup
      args:
        # Must match the neo4j image above (cypher-shell version)
        - NEO4J_IMAGE=neo4j:5.26-community
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - NEO4J_ADDRESS=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - backups:/backups
      - uploads_data:/data/uploads:ro
      - custom_inputs_data:/data/custom_inputs:ro
    depends_on:
      neo4j:
        condition: service_healthy

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  skills_data:
  hf_cache:
  backups:
