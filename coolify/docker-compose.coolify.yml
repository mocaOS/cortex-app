# Docker Compose for Coolify deployment
# Uses Coolify magic variables for dynamic URL generation
# Deploy this via Coolify's Docker Compose resource

services:
  neo4j:
    image: neo4j:5.15.0-community
    environment:
      # Username is hardcoded to 'neo4j' - don't set NEO4J_USER in Coolify env vars!
      - NEO4J_AUTH=neo4j/${SERVICE_PASSWORD_NEO4J}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      # NEO4J_USER not needed - backend defaults to 'neo4j'
      - NEO4J_PASSWORD=${SERVICE_PASSWORD_NEO4J}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - USE_OPENAI_EMBEDDINGS=${USE_OPENAI_EMBEDDINGS}
      - UPLOAD_DIR=/app/uploads
      - PYTHONUNBUFFERED=1
      # Coolify magic variable - exposes backend at api subdomain on port 8000
      - SERVICE_FQDN_API_8000
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Build-time arg for the public API URL
        - NEXT_PUBLIC_API_URL=${SERVICE_URL_API_8000}
    environment:
      # Coolify magic variable - generates the FQDN for frontend on port 3000
      - SERVICE_FQDN_FRONTEND_3000
      # Public API URL uses the backend's Coolify-assigned URL
      - NEXT_PUBLIC_API_URL=${SERVICE_URL_API_8000}
      # Internal API URL for server-side requests
      - API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
