# Docker Compose for Coolify deployment
# Uses Coolify magic variables for dynamic URL generation
# Deploy this via Coolify's Docker Compose resource
#
# Only REQUIRED env vars are declared below. All optional knobs (vision/graph-extraction
# model overrides, Compute3 turbo mode, relationship & community tuning, feature flags,
# pricing caps, branding, etc.) default to sensible values in backend/app/config.py.
# To override one, add it as a Coolify env var AND add a matching `- VAR=${VAR}` line
# under `environment:` below. See handbook/04-configuration.md for the full catalogue.

services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      # Username is hardcoded to 'neo4j' - don't set NEO4J_USER in Coolify env vars!
      - NEO4J_AUTH=neo4j/${SERVICE_PASSWORD_NEO4J}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      # --- Database (required) ---
      - NEO4J_URI=bolt://neo4j:7687
      # NEO4J_USER not needed - backend defaults to 'neo4j'
      - NEO4J_PASSWORD=${SERVICE_PASSWORD_NEO4J}
      # --- LLM (required) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      # --- Embeddings (required) ---
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - USE_OPENAI_EMBEDDINGS=${USE_OPENAI_EMBEDDINGS}
      # --- Runtime paths (do not change) ---
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      - PYTHONUNBUFFERED=1
      # --- Backend public URL (set BACKEND_URL in Coolify, e.g. https://api-kg.cortex.qwellco.de) ---
      - SERVICE_FQDN_BACKEND_8000=${BACKEND_URL}
      # --- Admin authentication ---
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    volumes:
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      - skills_data:/app/.agents/skills
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Build-time arg for the public API URL (set BACKEND_URL in Coolify)
        - NEXT_PUBLIC_API_URL=${BACKEND_URL}
        # Build-time args for branding customization (optional)
        - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL:-}
        - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
    environment:
      # Expose frontend at kg subdomain on port 3000 (set FRONTEND_URL in Coolify)
      - SERVICE_FQDN_FRONTEND_3000=${FRONTEND_URL}
      # Public API URL for client-side requests
      - NEXT_PUBLIC_API_URL=${BACKEND_URL}
      # Branding customization (optional — also needs the matching build args above)
      - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL:-}
      - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
      # Internal API URL for server-side requests
      - API_URL=http://backend:8000
      # Admin authentication (must match backend)
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  skills_data:
