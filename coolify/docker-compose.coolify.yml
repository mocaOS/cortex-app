# Docker Compose for Coolify deployment
# Uses Coolify magic variables for dynamic URL generation
# Deploy this via Coolify's Docker Compose resource

services:
  neo4j:
    image: neo4j:5.15.0-community
    environment:
      # Username is hardcoded to 'neo4j' - don't set NEO4J_USER in Coolify env vars!
      - NEO4J_AUTH=neo4j/${SERVICE_PASSWORD_NEO4J}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      # NEO4J_USER not needed - backend defaults to 'neo4j'
      - NEO4J_PASSWORD=${SERVICE_PASSWORD_NEO4J}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      # Vision model for image analysis (optional - falls back to OpenAI settings if API base/key not set)
      - VISION_MODEL=${VISION_MODEL:-}
      - VISION_MODEL_API_BASE=${VISION_MODEL_API_BASE:-}
      - VISION_MODEL_API_KEY=${VISION_MODEL_API_KEY:-}
      # Graph extraction model (optional - smaller/faster model for entity extraction)
      - GRAPH_EXTRACTION_MODEL=${GRAPH_EXTRACTION_MODEL:-}
      - GRAPH_EXTRACTION_API_BASE=${GRAPH_EXTRACTION_API_BASE:-}
      - GRAPH_EXTRACTION_API_KEY=${GRAPH_EXTRACTION_API_KEY:-}
      # Embedding configuration
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION}
      - USE_OPENAI_EMBEDDINGS=${USE_OPENAI_EMBEDDINGS}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      - PYTHONUNBUFFERED=1
      # Number of uvicorn workers (default 1, increase if you have RAM - each uses ~1-2GB)
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
      # Expose backend at api-kg subdomain on port 8000
      # Set BACKEND_URL in Coolify env vars (e.g., https://api-kg.cortex.qwellco.de)
      - SERVICE_FQDN_BACKEND_8000=${BACKEND_URL}
      # Admin authentication - set ADMIN_API_KEY in Coolify env vars
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      # Compute3 Turbo Mode (optional - set COMPUTE3_API_KEY in Coolify env vars)
      - COMPUTE3_API_KEY=${COMPUTE3_API_KEY:-}
      - COMPUTE3_GPU_TYPE=${COMPUTE3_GPU_TYPE:-h100}
      - COMPUTE3_GPU_COUNT=${COMPUTE3_GPU_COUNT:-4}
      - COMPUTE3_MODEL=${COMPUTE3_MODEL:-minimax-m21}
      # Relationship analysis
      - RELATIONSHIP_ANALYSIS_BATCH_SIZE=${RELATIONSHIP_ANALYSIS_BATCH_SIZE:-100}
      - AUTO_RELATIONSHIP_ANALYSIS_AFTER_BATCH=${AUTO_RELATIONSHIP_ANALYSIS_AFTER_BATCH:-false}
      - AUTO_COMMUNITY_DETECTION_AFTER_BATCH=${AUTO_COMMUNITY_DETECTION_AFTER_BATCH:-false}
      # API Key Analytics - track admin key usage (default: false)
      - TRACK_ADMIN_API_KEY_USAGE=${TRACK_ADMIN_API_KEY_USAGE:-false}
      # Resource Limits / Pricing Caps (0 = unlimited). See PRICING.md.
      - MAX_FILES=${MAX_FILES:-0}
      - MAX_ENTITIES=${MAX_ENTITIES:-0}
      - MAX_COLLECTIONS=${MAX_COLLECTIONS:-0}
      - MAX_QUERIES_PER_MONTH=${MAX_QUERIES_PER_MONTH:-0}
    volumes:
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      - skills_data:/app/.agents/skills
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # Build-time arg for the public API URL (set BACKEND_URL in Coolify)
        - NEXT_PUBLIC_API_URL=${BACKEND_URL}
        # Build-time args for branding customization
        - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL}
        - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR}
    environment:
      # Expose frontend at kg subdomain on port 3000
      # Set FRONTEND_URL in Coolify env vars (e.g., https://kg.cortex.qwellco.de)
      - SERVICE_FQDN_FRONTEND_3000=${FRONTEND_URL}
      # Public API URL for client-side requests
      - NEXT_PUBLIC_API_URL=${BACKEND_URL}
      # Branding customization - set these in Coolify env vars
      - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL}
      - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR}
      # Internal API URL for server-side requests
      - API_URL=http://backend:8000
      # Admin authentication - set these in Coolify env vars
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  skills_data:
