services:
  neo4j:
    image: neo4j:5.26-community
    container_name: cortex-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${SERVICE_PASSWORD_NEO4J:-bW3qnJ63dltJPIoMz054Bzn4uDsPGDVH}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      # Bounded JVM memory so the limit below is meaningful (mirrors prod).
      # Override vars are intentionally NOT prefixed NEO4J_: a raw NEO4J_*-prefixed
      # env var reaching this container is parsed by neo4j's entrypoint as a config
      # setting and rejected by strict_validation (matters under PaaS env injection).
      - NEO4J_dbms_memory_heap_initial__size=${CORTEX_NEO4J_HEAP_INITIAL:-512m}
      - NEO4J_dbms_memory_heap_max__size=${CORTEX_NEO4J_HEAP_MAX:-2G}
      - NEO4J_dbms_memory_pagecache_size=${CORTEX_NEO4J_PAGECACHE:-512m}
    # Hard ceiling: on hosts packing multiple tenant stacks, one graph blowing up
    # must self-OOM in its cgroup instead of letting the kernel OOM-killer pick a
    # victim in another tenant's stack. Sized for heap max + pagecache + overhead.
    mem_limit: ${CORTEX_NEO4J_MEM_LIMIT:-4g}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cortex-backend
    restart: unless-stopped
    # Hard memory ceiling: a runaway (e.g. a large export/import) self-OOMs inside
    # its cgroup and restarts cleanly, instead of exhausting the host and letting
    # the kernel OOM-killer pick Neo4j as the victim. Keep comfortably above normal
    # steady-state (~2G with the cross-encoder + embedder loaded). Tune per host.
    mem_limit: ${BACKEND_MEM_LIMIT:-4g}
    # Give uvicorn's graceful shutdown (in-flight requests, SSE streams) time to
    # drain before docker sends SIGKILL.
    stop_grace_period: 35s
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${SERVICE_PASSWORD_NEO4J:-bW3qnJ63dltJPIoMz054Bzn4uDsPGDVH}
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      # API Key Analytics - track admin key usage (default: false)
      - TRACK_ADMIN_API_KEY_USAGE=${TRACK_ADMIN_API_KEY_USAGE:-false}
      # At-rest encryption for secrets (git PATs, skill secret config).
      # Comma-separated Fernet keys; first encrypts, all decrypt (rotation).
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      # Persist HuggingFace model cache (cross-encoder reranker, embeddings)
      # across container restarts so we don't re-download ~80MB of models each time.
      - hf_cache:/app/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cortex-frontend
    restart: unless-stopped
    # Dev mode runs the Turbopack compiler in-process + @sentry/nextjs
    # instrumentation — peaks well past 1g while compiling routes, and an
    # undersized limit produces an OOM crash-loop (browser "refreshes" every
    # few seconds as HMR reconnects). Prod composes keep 1g: `next start`
    # serves a prebuilt bundle at a fraction of this.
    mem_limit: ${FRONTEND_MEM_LIMIT:-3g}
    env_file:
      - .env
    environment:
      # Overridable from .env for LAN/self-host setups where the browser runs on
      # a different machine than the stack (e.g. http://192.168.x.x:8000).
      # Compose gives `environment:` precedence over env_file, so without this
      # ${...} passthrough a .env value would be silently ignored.
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      - API_URL=http://backend:8000
      # Admin auth - these are read from .env file
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      # Error tracking (GlitchTip) — override what env_file would inherit:
      # SENTRY_DSN in .env is the BACKEND project's DSN; the frontend reports to
      # its own project. Defaults to this project's frontend GlitchTip; empty
      # string disables (no-colon `-` form: unset → default, empty → off).
      - SENTRY_DSN=${SENTRY_DSN_FRONTEND-https://cba599d7d91a4bc99c5024ec03eab733@glitchtip.cortex.eco/3}
      - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN_FRONTEND-https://cba599d7d91a4bc99c5024ec03eab733@glitchtip.cortex.eco/3}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  hf_cache:
