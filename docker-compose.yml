services:
  neo4j:
    image: neo4j:5.26-community
    container_name: cortex-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${SERVICE_PASSWORD_NEO4J:-bW3qnJ63dltJPIoMz054Bzn4uDsPGDVH}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cortex-backend
    restart: unless-stopped
    # Hard memory ceiling: a runaway (e.g. a large export/import) self-OOMs inside
    # its cgroup and restarts cleanly, instead of exhausting the host and letting
    # the kernel OOM-killer pick Neo4j as the victim. Keep comfortably above normal
    # steady-state (~2G with the cross-encoder + embedder loaded). Tune per host.
    mem_limit: ${BACKEND_MEM_LIMIT:-4g}
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${SERVICE_PASSWORD_NEO4J:-bW3qnJ63dltJPIoMz054Bzn4uDsPGDVH}
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      # API Key Analytics - track admin key usage (default: false)
      - TRACK_ADMIN_API_KEY_USAGE=${TRACK_ADMIN_API_KEY_USAGE:-false}
      # At-rest encryption for secrets (git PATs, skill secret config).
      # Comma-separated Fernet keys; first encrypts, all decrypt (rotation).
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      # Persist HuggingFace model cache (cross-encoder reranker, embeddings)
      # across container restarts so we don't re-download ~80MB of models each time.
      - hf_cache:/app/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cortex-frontend
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-1g}
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - API_URL=http://backend:8000
      # Admin auth - these are read from .env file
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  hf_cache:
