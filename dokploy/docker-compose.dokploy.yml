# Docker Compose for Dokploy deployment
# Uses Dokploy's Traefik proxy via dokploy-network
# Deploy this via Dokploy's Compose project type
#
# Dokploy injects env vars into the shell for ${} interpolation but does NOT
# create a .env file, so all vars must be passed explicitly via environment.
#
# Only REQUIRED env vars are declared below. Everything else — embedding settings,
# vision/graph-extraction overrides, relationship & community tuning, feature
# flags, chunking, resource caps, agent research, skills, etc. — defaults to sensible
# values in backend/app/config.py. To override one, add it as a Dokploy env var AND
# add a matching `- VAR=${VAR}` line under `environment:` below (and a `- VAR=${VAR}`
# under `build.args:` too if it is a NEXT_PUBLIC_* var that needs build-time inlining).
# See handbook/04-configuration.md for the full catalogue.
#
# Branding (NEXT_PUBLIC_LOGO_URL/NEXT_PUBLIC_ACCENT_COLOR) and ADMIN_EMAIL are declared
# below even though config.py defaults them — they're consumed by the frontend app, not
# backend, so trimming them (as a past commit did) silently breaks per-tenant branding
# and admin login. Don't re-trim these.
#
# Domain routing: Configure in Dokploy UI (Domains tab) per service,
# or uncomment the Traefik labels below for GitOps-style domain config.

services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      # Username is hardcoded to 'neo4j' - don't set NEO4J_USER in Dokploy env vars!
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      # NOTE: override vars below are intentionally NOT prefixed NEO4J_. A raw
      # NEO4J_*-prefixed env var reaching this container is parsed by neo4j's
      # entrypoint as a config setting (NEO4J_HEAP_INITIAL -> HEAP.INITIAL) and
      # rejected by strict_validation. CORTEX_* names are invisible to it.
      - NEO4J_dbms_memory_heap_initial__size=${CORTEX_NEO4J_HEAP_INITIAL:-512m}
      - NEO4J_dbms_memory_heap_max__size=${CORTEX_NEO4J_HEAP_MAX:-2G}
      - NEO4J_dbms_memory_pagecache_size=${CORTEX_NEO4J_PAGECACHE:-512m}
      # Server-side kill switch for runaway Cypher: a single unbounded query
      # would otherwise hold a pool connection + API worker thread forever.
      # 300s clears every legit workload (batched deletes/imports commit in
      # bounded inner transactions); analytic explores on huge graphs can raise it.
      - NEO4J_db_transaction_timeout=${CORTEX_NEO4J_TX_TIMEOUT:-300s}
      # Required by the backup sidecar: APOC writes the nightly logical export
      # server-side (byte-exact, no client round-trip) into the import dir,
      # which is bound to the shared backups volume below.
      - NEO4J_apoc_export_file_enabled=true
    # Hard ceiling so one tenant's graph blowing up self-OOMs in its cgroup
    # instead of letting the kernel OOM-killer pick another stack's container.
    mem_limit: ${CORTEX_NEO4J_MEM_LIMIT:-4g}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      # Shared with the backup sidecar: APOC exports land here (see above).
      - backups:/var/lib/neo4j/import
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Neo4j stays on the default network only (not exposed via Traefik)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    #     reservations:
    #       memory: 1G

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
      # Slim image by default. This is the cloud/AaaS deployment, where every
      # tenant offloads reranking + Docling to the shared cortex-helper (see the
      # RERANKER_SERVICE_URL / DOCLING_SERVICE_URL block below). So the local ML
      # stack (torch/sentence-transformers/docling/easyocr, ~1GB) and the
      # build-time model predownload are pure dead weight — INSTALL_LOCAL_ML=false
      # drops both. Slim has NO local fallback, so a slim tenant MUST reach the
      # helper (HELPER_STRICT_REMOTE recommended) and MUST use OpenAI embeddings
      # (EMBEDDING_MODEL defaults to openai/* below — do not set
      # USE_OPENAI_EMBEDDINGS=false on a slim tenant). Override per tenant with
      # INSTALL_LOCAL_ML=true in the Dokploy env ONLY for a stack that runs models
      # locally and does NOT use the helper. Dokploy interpolates ${VAR} into
      # build args from its env, same as the frontend's NEXT_PUBLIC_* below.
      args:
        - INSTALL_LOCAL_ML=${INSTALL_LOCAL_ML:-false}
    environment:
      # Pinned: this is the production Dokploy deployment. Without this, the
      # backend defaults to "development" — interactive API docs (/docs,
      # /redoc, /openapi.json) stay publicly exposed and the startup check
      # that refuses weak NEO4J_PASSWORD/SESSION_SECRET never runs.
      - ENVIRONMENT=production
      # --- Database (required) ---
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      # --- LLM (required) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      # --- Observability (Langfuse) — optional, injected per-tenant ---
      # Empty defaults keep untraced tenants working unchanged (no keys = no tracing).
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-}
      - LANGFUSE_TRACING_ENABLED=${LANGFUSE_TRACING_ENABLED:-true}
      - LANGFUSE_SAMPLE_RATE=${LANGFUSE_SAMPLE_RATE:-1.0}
      # Content masking: false (default) redacts all prompt/completion text before
      # export; true logs full content for debugging.
      - LANGFUSE_LOG_EXTENDED=${LANGFUSE_LOG_EXTENDED:-false}
      # Per-tenant trace segmentation (control plane injects the tenant slug).
      # Without this declaration the value never reaches the container, so every
      # tenant's traces collapse into one environment.
      - LANGFUSE_TRACING_ENVIRONMENT=${LANGFUSE_TRACING_ENVIRONMENT:-}
      # --- Error tracking (GlitchTip) ---
      # Defaults to this project's GlitchTip (backend project) so tracking works
      # with zero Dokploy config. Override SENTRY_DSN_BACKEND to point elsewhere,
      # or set it to an empty string to disable (note the no-colon `-` form:
      # unset → default, empty → off — lets a tenant opt out). Backend and
      # frontend report to different GlitchTip projects, hence the _BACKEND/
      # _FRONTEND-suffixed vars mapped onto the standard SENTRY_DSN name.
      - SENTRY_DSN=${SENTRY_DSN_BACKEND-https://93e9456b69bd475e89dc8c1b5756ed23@glitchtip.cortex.eco/2}
      # Empty → falls back to ENVIRONMENT (production). Set e.g. a tenant slug
      # to segment issues per stack in a shared GlitchTip project.
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-}
      # --- Runtime paths (do not change) ---
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      - PYTHONUNBUFFERED=1
      # --- Admin authentication ---
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      # Required with ENVIRONMENT=production above: startup refuses to boot
      # if this is unset/short while ADMIN_PASSWORD is set.
      - SESSION_SECRET=${SESSION_SECRET}
      # At-rest encryption for user-supplied secrets (git connector PATs,
      # secret-typed skill config). Comma-separated Fernet keys; the first
      # encrypts, all decrypt (zero-downtime rotation). Injected per-tenant by
      # meta-cortex at creation. Empty => plaintext storage + loud startup
      # warning; a MALFORMED key fails startup fast. MUST be declared here or
      # Dokploy never interpolates the injected value into the container.
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      # --- Shared cortex-helper (offload reranker + Docling to one per-host service) ---
      # Injected per-tenant by meta-cortex (control-plane CORTEX_HELPER_* config).
      # Empty => cortex-app uses its built-in local reranker/Docling subprocess.
      # These MUST be declared here: Dokploy interpolates ${VAR} from its shell but
      # writes no .env, so a var only reaches the container if listed under environment.
      - DOCLING_SERVICE_URL=${DOCLING_SERVICE_URL:-}
      - RERANKER_SERVICE_URL=${RERANKER_SERVICE_URL:-}
      # Query-time prompt-guard gate (shared cortex-helper /classify). URL empty
      # => guard disabled; PROMPT_GUARD is the runtime-toggle default.
      - PROMPT_GUARD_SERVICE_URL=${PROMPT_GUARD_SERVICE_URL:-}
      - PROMPT_GUARD=${PROMPT_GUARD:-true}
      - HELPER_SERVICE_TOKEN=${HELPER_SERVICE_TOKEN:-}
      - HELPER_STRICT_REMOTE=${HELPER_STRICT_REMOTE:-false}
      - INSTANCE_ID=${INSTANCE_ID:-}
      # --- Per-plan overrides (model tiers, processing, resource limits) ---
      # Forwarded from the subscription-plan env so plan tiers actually differ.
      # Dokploy only interpolates DECLARED vars, so each knob a plan controls
      # needs a line here. Every :- default equals backend/app/config.py's
      # built-in default, so a tenant that doesn't set the var is unchanged.
      # Empty string on a model field = "inherit OPENAI_*" (config.py resolves
      # the chain). Add more lines below for any other config.py knob you want
      # a plan to drive.
      - OPENAI_MAX_CONTEXT=${OPENAI_MAX_CONTEXT:-256000}
      # Per-stage inference routing. cortex-app is OpenAI-compatible only: each
      # stage picks its provider via its own *_API_BASE + *_API_KEY, both falling
      # back to OPENAI_* when empty (config.py resolves the inherit chain). The
      # plan's env_vars supply the *_API_BASE + *_MODEL; meta-cortex's control
      # plane MINTS and injects the per-tenant *_API_KEY (one OpenAI key for the
      # primary model, one Venice key reused across embedding/graph/vision). These
      # MUST be declared here or Dokploy never interpolates the injected values.
      # (RELATIONSHIP_EXTRACTION_* is intentionally NOT declared — it inherits
      # GRAPH_EXTRACTION_*, so declaring it empty would only re-trigger inherit.)
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - EMBEDDING_API_BASE=${EMBEDDING_API_BASE:-}
      - EMBEDDING_API_KEY=${EMBEDDING_API_KEY:-}
      # Per-input embed token cap. Default matches config.py (5400) — a bare int,
      # NOT an inherit-0, so the fallback MUST be 5400 (0 would break embedding).
      # Set lower for Venice's own tokenizer (~1.2-1.4x cl100k) or higher for
      # long-context embed models (e.g. text-embedding-qwen3-8b → 32768).
      - EMBEDDING_MAX_INPUT_TOKENS=${EMBEDDING_MAX_INPUT_TOKENS:-5400}
      - VISION_MODEL=${VISION_MODEL:-}
      - VISION_MODEL_API_BASE=${VISION_MODEL_API_BASE:-}
      - VISION_MODEL_API_KEY=${VISION_MODEL_API_KEY:-}
      # Fallback matches the config.py default (2) — each in-flight image occupies
      # multiple provider slots via its call chain; 3 caused 429 bursts.
      - VISION_MAX_CONCURRENT=${VISION_MAX_CONCURRENT:-2}
      - GRAPH_EXTRACTION_MODEL=${GRAPH_EXTRACTION_MODEL:-}
      - GRAPH_EXTRACTION_API_BASE=${GRAPH_EXTRACTION_API_BASE:-}
      - GRAPH_EXTRACTION_API_KEY=${GRAPH_EXTRACTION_API_KEY:-}
      - GRAPH_EXTRACTION_MAX_CONTEXT=${GRAPH_EXTRACTION_MAX_CONTEXT:-0}
      - RELATIONSHIP_MAX_CONTEXT=${RELATIONSHIP_MAX_CONTEXT:-0}
      # Extraction output-token budget. Fallback matches config.py's shipped
      # default (12000 since 2026-07-09). NOT :-0 — an explicit 0 here would
      # force the inherit chain (→ OPENAI_MAX_OUTPUT_TOKENS = 8000) and undo
      # the new default for every tenant.
      - EXTRACTION_MAX_OUTPUT_TOKENS=${EXTRACTION_MAX_OUTPUT_TOKENS:-12000}
      # (RELATIONSHIP_ANALYSIS_BATCH_SIZE was removed here: the knob no longer
      # exists in config.py — the targeted-discovery Step 2 replaced the legacy
      # batch scan — so the var was silently ignored.)
      - CONCURRENT_EXTRACTIONS=${CONCURRENT_EXTRACTIONS:-3}
      - CONCURRENT_RELATIONS=${CONCURRENT_RELATIONS:-3}
      - BATCH_PROCESSING_CONCURRENCY=${BATCH_PROCESSING_CONCURRENCY:-2}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - MAX_FILES=${MAX_FILES:-0}
      - MAX_ENTITIES=${MAX_ENTITIES:-0}
      - MAX_COLLECTIONS=${MAX_COLLECTIONS:-0}
      - MAX_QUERIES_PER_MONTH=${MAX_QUERIES_PER_MONTH:-0}
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      - skills_data:/app/.agents/skills
      # Persist HuggingFace model cache (cross-encoder reranker, embeddings)
      # across container restarts so we don't re-download ~80MB of models each time.
      # Dokploy persists named volumes across redeploys at /etc/dokploy/projects/<id>/volumes.
      - hf_cache:/app/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    # Hard memory ceiling so a runaway (e.g. a large export/import) self-OOMs in
    # its cgroup and restarts, instead of exhausting the host and letting the
    # kernel OOM-killer take Neo4j down with it. Tune per host via BACKEND_MEM_LIMIT.
    mem_limit: ${BACKEND_MEM_LIMIT:-4g}
    # Give uvicorn's graceful shutdown (in-flight requests, SSE streams) time to
    # drain before docker sends SIGKILL.
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # /health returns 503 while degraded (Neo4j down / schema unconfirmed);
      # give startup schema-init time before the gate counts failures.
      start_period: 60s
    networks:
      # `backend` as a DNS name is AMBIGUOUS on the shared dokploy-network:
      # every tenant stack on the host auto-aliases its own service there, and
      # Docker DNS aggregates the records across all networks the caller is
      # attached to — server-side calls to http://backend:8000 intermittently
      # reached ANOTHER tenant's backend, which rejects this tenant's API keys
      # (random 401s in chat/frontend). Internal consumers must use
      # cortex-backend-internal, which exists ONLY on this stack's private
      # default network. Do not target bare `backend` from anything that also
      # joins dokploy-network.
      default:
        aliases:
          - cortex-backend-internal
      dokploy-network: {}
    # Uncomment to configure domains via Traefik labels instead of Dokploy UI:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.cortex-backend.rule=Host(`api-cortex.yourdomain.com`)"
    #   - "traefik.http.routers.cortex-backend.entrypoints=websecure"
    #   - "traefik.http.routers.cortex-backend.tls.certResolver=letsencrypt"
    #   - "traefik.http.services.cortex-backend.loadbalancer.server.port=8000"
    #   - "traefik.docker.network=dokploy-network"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        # Build-time args for Next.js (set NEXT_PUBLIC_API_URL in Dokploy env vars)
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL:-}
        - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
        # Server-side API URL baked into next.config.mjs rewrites at build time.
        # cortex-backend-internal (NOT bare `backend`) — see the backend
        # service's networks comment: the bare name crosses tenant stacks on
        # the shared dokploy-network.
        - API_URL=http://cortex-backend-internal:8000
        # --- Error tracking (GlitchTip) — DSN + upload config default to this
        # project's GlitchTip (override the SENTRY_* vars to point elsewhere;
        # empty string disables — no-colon `-` form). The DSN is inlined into
        # the client bundle at build time. SENTRY_URL/ORG/PROJECT plus a
        # SENTRY_AUTH_TOKEN enable the build-time source-map upload so prod stack
        # traces show original TypeScript. The token is a real secret and is
        # intentionally NOT defaulted — set SENTRY_AUTH_TOKEN in the Dokploy env
        # to turn on uploads; without it the build still succeeds (frontend
        # traces just stay minified). It stays in the builder stage, never the
        # runtime image.
        - NEXT_PUBLIC_SENTRY_DSN=${SENTRY_DSN_FRONTEND-https://cba599d7d91a4bc99c5024ec03eab733@glitchtip.cortex.eco/3}
        - NEXT_PUBLIC_SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-}
        - SENTRY_URL=${SENTRY_URL-https://glitchtip.cortex.eco}
        - SENTRY_ORG=${SENTRY_ORG-cortex}
        - SENTRY_PROJECT=${SENTRY_PROJECT-cortex-frontend}
        - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN:-}
    environment:
      # Public API URL for client-side requests
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      # Internal API URL for server-side requests (stack-private alias)
      - API_URL=http://cortex-backend-internal:8000
      # Branding (NEXT_PUBLIC_ for build-time client inlining, non-prefixed for runtime Server Components)
      - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL:-}
      - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
      - ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
      # Admin authentication (must match backend). ADMIN_EMAIL is compared literally
      # by the frontend (frontend/src/lib/auth.ts) — without it, it falls back to its
      # hardcoded "admin@example.com" default and every real login is rejected.
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
      # Error tracking (GlitchTip) — server-side runtime DSN (the client DSN is
      # inlined at build via the build arg above; this covers Server
      # Components/proxy errors reported by the Node process). Defaults to this
      # project's frontend GlitchTip; empty string disables (no-colon `-` form).
      - SENTRY_DSN=${SENTRY_DSN_FRONTEND-https://cba599d7d91a4bc99c5024ec03eab733@glitchtip.cortex.eco/3}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-}
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-1g}
    networks:
      - default
      - dokploy-network
    # Uncomment to configure domains via Traefik labels instead of Dokploy UI:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.cortex-frontend.rule=Host(`cortex.yourdomain.com`)"
    #   - "traefik.http.routers.cortex-frontend.entrypoints=websecure"
    #   - "traefik.http.routers.cortex-frontend.tls.certResolver=letsencrypt"
    #   - "traefik.http.services.cortex-frontend.loadbalancer.server.port=3000"
    #   - "traefik.docker.network=dokploy-network"

  chat:
    build:
      # Cortex Chat lives in its own public repo — BuildKit clones it as a
      # remote build context. No build args: all config is runtime env.
      context: https://github.com/mocaOS/cortex-chat.git#main
      dockerfile: Dockerfile
    environment:
      # Cortex backend over the internal compose network (server-side only —
      # the browser talks to chat, chat proxies to the backend).
      # cortex-backend-internal (NOT bare `backend`) — the bare name crosses
      # tenant stacks on the shared dokploy-network (see backend networks).
      - CORTEX_API_URL=http://cortex-backend-internal:8000
      # Reuse the tenant admin credentials: the chat superadmin signs in with
      # the same email/password as Cortex, and scoped backend keys are minted
      # with the tenant admin API key.
      - BACKEND_ADMIN_API_KEY=${ADMIN_API_KEY}
      - SUPERADMIN_EMAIL=${ADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${ADMIN_PASSWORD}
      # 32 random bytes, base64 — encrypts minted backend keys in SQLite
      - APP_ENCRYPTION_KEY=${CHAT_APP_ENCRYPTION_KEY}
    expose:
      - "3000"
    volumes:
      # SQLite DB + avatars + uploaded branding assets
      - chat_data:/app/data
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    # Uncomment to configure domains via Traefik labels instead of Dokploy UI:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.cortex-chat.rule=Host(`chat-cortex.yourdomain.com`)"
    #   - "traefik.http.routers.cortex-chat.entrypoints=websecure"
    #   - "traefik.http.routers.cortex-chat.tls.certResolver=letsencrypt"
    #   - "traefik.http.services.cortex-chat.loadbalancer.server.port=3000"
    #   - "traefik.docker.network=dokploy-network"

  backup:
    # Nightly online backup of the tenant's data: server-side APOC logical
    # export of the graph (verified: row counts + checksums + .complete marker;
    # retention only rotates after a verified success) + tar of
    # uploads/custom_inputs/chat volumes. Without this, a bad redeploy or
    # volume cleanup is total, unrecoverable tenant data loss — the control
    # plane only backs up its own Postgres, never tenant volumes. Backups land
    # in the `backups` named volume (persisted by Dokploy across redeploys);
    # ship them off-host with restic/rclone at the fleet level for disaster
    # recovery. The healthcheck goes unhealthy when the newest verified backup
    # is older than 2x the interval — a silently failing backup is visible.
    # Manual run:  docker compose exec backup /backup.sh
    # Restore:     docker compose exec -e RESTORE_WIPE=yes backup /restore.sh <ts>
    #              (full runbook: ops/backup/restore.sh header)
    build:
      context: ../ops/backup
      args:
        # Must match the neo4j image above (cypher-shell version)
        - NEO4J_IMAGE=neo4j:5.26-community
    restart: unless-stopped
    mem_limit: 512m
    environment:
      - NEO4J_ADDRESS=neo4j://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - BACKUP_INTERVAL_SECONDS=${BACKUP_INTERVAL_SECONDS:-86400}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_INITIAL_DELAY_SECONDS=${BACKUP_INITIAL_DELAY_SECONDS:-120}
    volumes:
      - backups:/backups
      - uploads_data:/data/uploads:ro
      - custom_inputs_data:/data/custom_inputs:ro
      - chat_data:/data/chat:ro
    healthcheck:
      # Healthy = a verified backup completed within the last 2 intervals.
      # start_period covers the initial delay + a large first export.
      test:
        [
          "CMD-SHELL",
          "test -f /backups/LAST_SUCCESS && [ $$(( $$(date +%s) - $$(cat /backups/LAST_SUCCESS) )) -lt $$(( $${BACKUP_INTERVAL_SECONDS:-86400} * 2 )) ]",
        ]
      interval: 15m
      timeout: 10s
      retries: 2
      start_period: 2h
    depends_on:
      neo4j:
        condition: service_healthy

networks:
  dokploy-network:
    external: true

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  skills_data:
  hf_cache:
  chat_data:
  backups:
