# Docker Compose for Dokploy deployment
# Uses Dokploy's Traefik proxy via dokploy-network
# Deploy this via Dokploy's Compose project type
#
# Dokploy injects env vars into the shell for ${} interpolation but does NOT
# create a .env file, so all vars must be passed explicitly via environment.
#
# Only REQUIRED env vars are declared below. Everything else — embedding settings,
# vision/graph-extraction overrides, Compute3, relationship & community tuning, feature
# flags, chunking, resource caps, agent research, skills, branding (logo/accent color),
# admin email, etc. — defaults to sensible values in backend/app/config.py. To override
# one, add it as a Dokploy env var AND add a matching `- VAR=${VAR}` line under
# `environment:` below (and a `- VAR=${VAR}` under `build.args:` too if it is a NEXT_PUBLIC_*
# var that needs build-time inlining). See handbook/04-configuration.md for the full catalogue.
#
# Domain routing: Configure in Dokploy UI (Domains tab) per service,
# or uncomment the Traefik labels below for GitOps-style domain config.

services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      # Username is hardcoded to 'neo4j' - don't set NEO4J_USER in Dokploy env vars!
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Neo4j stays on the default network only (not exposed via Traefik)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    #     reservations:
    #       memory: 1G

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    environment:
      # --- Database (required) ---
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      # --- LLM (required) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      # --- Runtime paths (do not change) ---
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      - PYTHONUNBUFFERED=1
      # --- Admin authentication ---
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      - skills_data:/app/.agents/skills
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
      - dokploy-network
    # Uncomment to configure domains via Traefik labels instead of Dokploy UI:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.cortex-backend.rule=Host(`api-cortex.yourdomain.com`)"
    #   - "traefik.http.routers.cortex-backend.entrypoints=websecure"
    #   - "traefik.http.routers.cortex-backend.tls.certResolver=letsencrypt"
    #   - "traefik.http.services.cortex-backend.loadbalancer.server.port=8000"
    #   - "traefik.docker.network=dokploy-network"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        # Build-time args for Next.js (set NEXT_PUBLIC_API_URL in Dokploy env vars)
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        # Server-side API URL baked into next.config.mjs rewrites at build time
        - API_URL=http://backend:8000
    environment:
      # Public API URL for client-side requests
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      # Internal API URL for server-side requests
      - API_URL=http://backend:8000
      # Admin authentication (must match backend)
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    # Uncomment to configure domains via Traefik labels instead of Dokploy UI:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.cortex-frontend.rule=Host(`cortex.yourdomain.com`)"
    #   - "traefik.http.routers.cortex-frontend.entrypoints=websecure"
    #   - "traefik.http.routers.cortex-frontend.tls.certResolver=letsencrypt"
    #   - "traefik.http.services.cortex-frontend.loadbalancer.server.port=3000"
    #   - "traefik.docker.network=dokploy-network"

networks:
  dokploy-network:
    external: true

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  skills_data:
