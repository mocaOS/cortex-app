# Docker Compose for Dokploy deployment
# Uses Dokploy's Traefik proxy via dokploy-network
# Deploy this via Dokploy's Compose project type
#
# Dokploy injects env vars into the shell for ${} interpolation but does NOT
# create a .env file, so all vars must be passed explicitly via environment.
#
# Only REQUIRED env vars are declared below. Everything else — embedding settings,
# vision/graph-extraction overrides, relationship & community tuning, feature
# flags, chunking, resource caps, agent research, skills, etc. — defaults to sensible
# values in backend/app/config.py. To override one, add it as a Dokploy env var AND
# add a matching `- VAR=${VAR}` line under `environment:` below (and a `- VAR=${VAR}`
# under `build.args:` too if it is a NEXT_PUBLIC_* var that needs build-time inlining).
# See handbook/04-configuration.md for the full catalogue.
#
# Branding (NEXT_PUBLIC_LOGO_URL/NEXT_PUBLIC_ACCENT_COLOR) and ADMIN_EMAIL are declared
# below even though config.py defaults them — they're consumed by the frontend app, not
# backend, so trimming them (as a past commit did) silently breaks per-tenant branding
# and admin login. Don't re-trim these.
#
# Domain routing: Configure in Dokploy UI (Domains tab) per service,
# or uncomment the Traefik labels below for GitOps-style domain config.

services:
  neo4j:
    image: neo4j:5.26-community
    environment:
      # Username is hardcoded to 'neo4j' - don't set NEO4J_USER in Dokploy env vars!
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      # NOTE: override vars below are intentionally NOT prefixed NEO4J_. A raw
      # NEO4J_*-prefixed env var reaching this container is parsed by neo4j's
      # entrypoint as a config setting (NEO4J_HEAP_INITIAL -> HEAP.INITIAL) and
      # rejected by strict_validation. CORTEX_* names are invisible to it.
      - NEO4J_dbms_memory_heap_initial__size=${CORTEX_NEO4J_HEAP_INITIAL:-512m}
      - NEO4J_dbms_memory_heap_max__size=${CORTEX_NEO4J_HEAP_MAX:-2G}
      - NEO4J_dbms_memory_pagecache_size=${CORTEX_NEO4J_PAGECACHE:-512m}
    # Hard ceiling so one tenant's graph blowing up self-OOMs in its cgroup
    # instead of letting the kernel OOM-killer pick another stack's container.
    mem_limit: ${CORTEX_NEO4J_MEM_LIMIT:-4g}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    # Neo4j stays on the default network only (not exposed via Traefik)
    # deploy:
    #   resources:
    #     limits:
    #       memory: 4G
    #     reservations:
    #       memory: 1G

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.prod
    environment:
      # Pinned: this is the production Dokploy deployment. Without this, the
      # backend defaults to "development" — interactive API docs (/docs,
      # /redoc, /openapi.json) stay publicly exposed and the startup check
      # that refuses weak NEO4J_PASSWORD/SESSION_SECRET never runs.
      - ENVIRONMENT=production
      # --- Database (required) ---
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      # --- LLM (required) ---
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_MODEL=${OPENAI_MODEL}
      # --- Observability (Langfuse) — optional, injected per-tenant ---
      # Empty defaults keep untraced tenants working unchanged (no keys = no tracing).
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-}
      - LANGFUSE_TRACING_ENABLED=${LANGFUSE_TRACING_ENABLED:-true}
      - LANGFUSE_SAMPLE_RATE=${LANGFUSE_SAMPLE_RATE:-1.0}
      # --- Runtime paths (do not change) ---
      - UPLOAD_DIR=/app/uploads
      - CUSTOM_INPUTS_DIR=/app/custom_inputs
      - PYTHONUNBUFFERED=1
      # --- Admin authentication ---
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      # Required with ENVIRONMENT=production above: startup refuses to boot
      # if this is unset/short while ADMIN_PASSWORD is set.
      - SESSION_SECRET=${SESSION_SECRET}
      # --- Shared cortex-helper (offload reranker + Docling to one per-host service) ---
      # Injected per-tenant by meta-cortex (control-plane CORTEX_HELPER_* config).
      # Empty => cortex-app uses its built-in local reranker/Docling subprocess.
      # These MUST be declared here: Dokploy interpolates ${VAR} from its shell but
      # writes no .env, so a var only reaches the container if listed under environment.
      - DOCLING_SERVICE_URL=${DOCLING_SERVICE_URL:-}
      - RERANKER_SERVICE_URL=${RERANKER_SERVICE_URL:-}
      - HELPER_SERVICE_TOKEN=${HELPER_SERVICE_TOKEN:-}
      - HELPER_STRICT_REMOTE=${HELPER_STRICT_REMOTE:-false}
      - INSTANCE_ID=${INSTANCE_ID:-}
      # --- Per-plan overrides (model tiers, processing, resource limits) ---
      # Forwarded from the subscription-plan env so plan tiers actually differ.
      # Dokploy only interpolates DECLARED vars, so each knob a plan controls
      # needs a line here. Every :- default equals backend/app/config.py's
      # built-in default, so a tenant that doesn't set the var is unchanged.
      # Empty string on a model field = "inherit OPENAI_*" (config.py resolves
      # the chain). Add more lines below for any other config.py knob you want
      # a plan to drive.
      - OPENAI_MAX_CONTEXT=${OPENAI_MAX_CONTEXT:-32768}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-openai/text-embedding-3-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - VISION_MODEL=${VISION_MODEL:-}
      - VISION_MAX_CONCURRENT=${VISION_MAX_CONCURRENT:-3}
      - GRAPH_EXTRACTION_MODEL=${GRAPH_EXTRACTION_MODEL:-}
      - GRAPH_EXTRACTION_MAX_CONTEXT=${GRAPH_EXTRACTION_MAX_CONTEXT:-0}
      - RELATIONSHIP_MAX_CONTEXT=${RELATIONSHIP_MAX_CONTEXT:-0}
      - RELATIONSHIP_ANALYSIS_BATCH_SIZE=${RELATIONSHIP_ANALYSIS_BATCH_SIZE:-100}
      - CONCURRENT_EXTRACTIONS=${CONCURRENT_EXTRACTIONS:-3}
      - CONCURRENT_RELATIONS=${CONCURRENT_RELATIONS:-3}
      - BATCH_PROCESSING_CONCURRENCY=${BATCH_PROCESSING_CONCURRENCY:-2}
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - MAX_FILES=${MAX_FILES:-0}
      - MAX_ENTITIES=${MAX_ENTITIES:-0}
      - MAX_COLLECTIONS=${MAX_COLLECTIONS:-0}
      - MAX_QUERIES_PER_MONTH=${MAX_QUERIES_PER_MONTH:-0}
    expose:
      - "8000"
    volumes:
      - uploads_data:/app/uploads
      - custom_inputs_data:/app/custom_inputs
      - skills_data:/app/.agents/skills
      # Persist HuggingFace model cache (cross-encoder reranker, embeddings)
      # across container restarts so we don't re-download ~80MB of models each time.
      # Dokploy persists named volumes across redeploys at /etc/dokploy/projects/<id>/volumes.
      - hf_cache:/app/.cache/huggingface
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    # Hard memory ceiling so a runaway (e.g. a large export/import) self-OOMs in
    # its cgroup and restarts, instead of exhausting the host and letting the
    # kernel OOM-killer take Neo4j down with it. Tune per host via BACKEND_MEM_LIMIT.
    mem_limit: ${BACKEND_MEM_LIMIT:-4g}
    # Give uvicorn's graceful shutdown (in-flight requests, SSE streams) time to
    # drain before docker sends SIGKILL.
    stop_grace_period: 35s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - default
      - dokploy-network
    # Uncomment to configure domains via Traefik labels instead of Dokploy UI:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.cortex-backend.rule=Host(`api-cortex.yourdomain.com`)"
    #   - "traefik.http.routers.cortex-backend.entrypoints=websecure"
    #   - "traefik.http.routers.cortex-backend.tls.certResolver=letsencrypt"
    #   - "traefik.http.services.cortex-backend.loadbalancer.server.port=8000"
    #   - "traefik.docker.network=dokploy-network"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.prod
      args:
        # Build-time args for Next.js (set NEXT_PUBLIC_API_URL in Dokploy env vars)
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL:-}
        - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
        # Server-side API URL baked into next.config.mjs rewrites at build time
        - API_URL=http://backend:8000
    environment:
      # Public API URL for client-side requests
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      # Internal API URL for server-side requests
      - API_URL=http://backend:8000
      # Branding (NEXT_PUBLIC_ for build-time client inlining, non-prefixed for runtime Server Components)
      - NEXT_PUBLIC_LOGO_URL=${NEXT_PUBLIC_LOGO_URL:-}
      - NEXT_PUBLIC_ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
      - ACCENT_COLOR=${NEXT_PUBLIC_ACCENT_COLOR:-}
      # Admin authentication (must match backend). ADMIN_EMAIL is compared literally
      # by the frontend (frontend/src/lib/auth.ts) — without it, it falls back to its
      # hardcoded "admin@example.com" default and every real login is rejected.
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    expose:
      - "3000"
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: ${FRONTEND_MEM_LIMIT:-1g}
    networks:
      - default
      - dokploy-network
    # Uncomment to configure domains via Traefik labels instead of Dokploy UI:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.cortex-frontend.rule=Host(`cortex.yourdomain.com`)"
    #   - "traefik.http.routers.cortex-frontend.entrypoints=websecure"
    #   - "traefik.http.routers.cortex-frontend.tls.certResolver=letsencrypt"
    #   - "traefik.http.services.cortex-frontend.loadbalancer.server.port=3000"
    #   - "traefik.docker.network=dokploy-network"

  chat:
    build:
      # Cortex Chat lives in its own public repo — BuildKit clones it as a
      # remote build context. No build args: all config is runtime env.
      context: https://github.com/mocaOS/cortex-chat.git#main
      dockerfile: Dockerfile
    environment:
      # Cortex backend over the internal compose network (server-side only —
      # the browser talks to chat, chat proxies to the backend)
      - CORTEX_API_URL=http://backend:8000
      # Reuse the tenant admin credentials: the chat superadmin signs in with
      # the same email/password as Cortex, and scoped backend keys are minted
      # with the tenant admin API key.
      - BACKEND_ADMIN_API_KEY=${ADMIN_API_KEY}
      - SUPERADMIN_EMAIL=${ADMIN_EMAIL}
      - SUPERADMIN_PASSWORD=${ADMIN_PASSWORD}
      # 32 random bytes, base64 — encrypts minted backend keys in SQLite
      - APP_ENCRYPTION_KEY=${CHAT_APP_ENCRYPTION_KEY}
    expose:
      - "3000"
    volumes:
      # SQLite DB + avatars + uploaded branding assets
      - chat_data:/app/data
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    # Uncomment to configure domains via Traefik labels instead of Dokploy UI:
    # labels:
    #   - "traefik.enable=true"
    #   - "traefik.http.routers.cortex-chat.rule=Host(`chat-cortex.yourdomain.com`)"
    #   - "traefik.http.routers.cortex-chat.entrypoints=websecure"
    #   - "traefik.http.routers.cortex-chat.tls.certResolver=letsencrypt"
    #   - "traefik.http.services.cortex-chat.loadbalancer.server.port=3000"
    #   - "traefik.docker.network=dokploy-network"

networks:
  dokploy-network:
    external: true

volumes:
  neo4j_data:
  neo4j_logs:
  uploads_data:
  custom_inputs_data:
  skills_data:
  hf_cache:
  chat_data:
